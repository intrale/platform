name: Distribución Android — Firebase App Distribution (3 Flavors)

# Distribuye las 3 apps Android (client, business, delivery) a Firebase App Distribution.
#
# PRERREQUISITOS (ver docs/distribution-strategy.md sección 2.1, 4.3, 6):
#   - Proyecto Firebase creado en console.firebase.google.com
#   - 3 apps Android registradas:
#     - com.intrale.app.client (flavor client)
#     - com.intrale.app.business (flavor business)
#     - com.intrale.app.delivery (flavor delivery)
#   - Grupo de testers "friends-family" creado en Firebase
#   - Secrets configurados en GitHub (FIREBASE_TOKEN, FIREBASE_APP_ID_*, FIREBASE_TESTERS_GROUP)
#
# FLUJO:
#   - push a main O workflow_dispatch manual → build 3 APKs en paralelo
#   - cada APK se sube a Firebase App Distribution
#   - testers reciben notificación por email para actualizar la app
#   - notificación Telegram al completar

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de release (visible en Firebase App Distribution)'
        required: false
        default: 'Build automático de Friends & Family'

jobs:
  build-and-distribute:
    name: Build & Distribute — ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [ client, business, delivery ]
      max-parallel: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Preparar variables del flavor
        id: flavor
        run: |
          FLAVOR="${{ matrix.flavor }}"
          # Capitalizar primera letra (client → Client, business → Business)
          FLAVOR_CAP="${FLAVOR^}"
          # Uppercase completo para la clave de secret (client → CLIENT)
          FLAVOR_UPPER="${FLAVOR^^}"
          echo "cap=${FLAVOR_CAP}" >> $GITHUB_OUTPUT
          echo "upper=${FLAVOR_UPPER}" >> $GITHUB_OUTPUT

      - name: Build APK — ${{ matrix.flavor }}
        run: |
          chmod +x gradlew
          ./gradlew :app:composeApp:assemble${{ steps.flavor.outputs.cap }}Debug \
            -x compile${{ steps.flavor.outputs.cap }}DebugAndroidTestKotlinAndroid \
            -x compileTestKotlinIosX64 \
            -x compileProductionExecutableKotlinWasmJsOptimize

      - name: Upload to Firebase App Distribution — ${{ matrix.flavor }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets[format('FIREBASE_APP_ID_{0}', steps.flavor.outputs.upper)] }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: ${{ secrets.FIREBASE_TESTERS_GROUP }}
          releaseNotes: ${{ github.event.inputs.release_notes || github.event.head_commit.message }}
          file: app/composeApp/build/outputs/apk/${{ matrix.flavor }}/debug/composeApp-${{ matrix.flavor }}-debug.apk

  notify:
    name: Notificar resultado
    needs: build-and-distribute
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determinar estatus
        id: status
        run: |
          if [ "${{ needs.build-and-distribute.result }}" = "success" ]; then
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "text=exitosa" >> $GITHUB_OUTPUT
          else
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "text=fallida" >> $GITHUB_OUTPUT
          fi

      - name: Notificar por Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="${{ steps.status.outputs.icon }} Android Firebase App Distribution — Build #${{ github.run_number }} ${{ steps.status.outputs.text }}

          🚀 Intrale (client)
          🏪 Intrale Negocios (business)
          🚚 Intrale Repartos (delivery)

          Testers: revisa tu email de Firebase para descargar la última versión.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}"
