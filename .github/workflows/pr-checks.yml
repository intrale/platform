name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Detectar qué módulos cambiaron ──────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      app: ${{ steps.filter.outputs.app }}
      users: ${{ steps.filter.outputs.users }}
      tools: ${{ steps.filter.outputs.tools }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            app:
              - 'app/**'
            users:
              - 'users/**'
            tools:
              - 'tools/**'
            shared:
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'buildSrc/**'
              - 'gradle.properties'

  # ── Verificación global de strings ──────────────────────────────
  verify-strings:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.app == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run verifyNoLegacyStrings
        run: ./gradlew verifyNoLegacyStrings

  # ── Backend ─────────────────────────────────────────────────────
  check-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Check backend
        run: ./gradlew :backend:check :backend:koverVerify :backend:koverHtmlReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/
            backend/build/test-results/
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-reports
          path: backend/build/reports/kover/
          retention-days: 14

  # ── Users (depende de backend) ──────────────────────────────────
  check-users:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.users == 'true' ||
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Check users
        run: ./gradlew :users:check :users:koverVerify :users:koverHtmlReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: users-test-reports
          path: |
            users/build/reports/tests/
            users/build/test-results/
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: users-coverage-reports
          path: users/build/reports/kover/
          retention-days: 14

  # ── App Compose Multiplatform ───────────────────────────────────
  check-app:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.app == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Check app
        run: ./gradlew :app:composeApp:check :app:composeApp:koverVerify :app:composeApp:koverHtmlReport -x compileTestKotlinIosX64

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-test-reports
          path: |
            app/composeApp/build/reports/tests/
            app/composeApp/build/test-results/
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage-reports
          path: app/composeApp/build/reports/kover/
          retention-days: 14

  # ── Tools (KSP processor) ──────────────────────────────────────
  check-tools:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.tools == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Check tools
        run: ./gradlew :tools:forbidden-strings-processor:check

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tools-test-reports
          path: |
            tools/forbidden-strings-processor/build/reports/tests/
            tools/forbidden-strings-processor/build/test-results/
          retention-days: 14

  # ── E2E QA Tests ──────────────────────────────────────────────
  e2e-qa:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.users == 'true' ||
      needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -so /dev/null -w '%{http_code}' http://localhost:8000 | grep -q 400"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      moto:
        image: motoserver/moto
        ports:
          - 5050:5000
        env:
          MOTO_SERVICE: cognitoidp
        options: >-
          --health-cmd "curl -sf http://localhost:5000 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Initialize AWS services (DynamoDB tables + Cognito)
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Instalar AWS CLI
          pip install awscli --quiet

          # Crear tablas DynamoDB
          for table_pk in "business:name" "users:email" "userbusinessprofile:compositeKey"; do
            TABLE="${table_pk%%:*}"
            PK="${table_pk##*:}"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions "AttributeName=$PK,AttributeType=S" \
              --key-schema "AttributeName=$PK,KeyType=HASH" \
              --billing-mode PAY_PER_REQUEST \
              --endpoint-url http://localhost:8000 \
              --region us-east-1 || true
          done

          # Crear Cognito User Pool
          USER_POOL_ID=$(aws cognito-idp create-user-pool \
            --pool-name "intrale-ci" \
            --auto-verified-attributes email \
            --username-attributes email \
            --endpoint-url http://localhost:5050 \
            --region us-east-1 \
            --query "UserPool.Id" --output text)

          CLIENT_ID=$(aws cognito-idp create-user-pool-client \
            --user-pool-id "$USER_POOL_ID" \
            --client-name "intrale-ci-app" \
            --explicit-auth-flows ALLOW_ADMIN_USER_PASSWORD_AUTH ALLOW_REFRESH_TOKEN_AUTH \
            --endpoint-url http://localhost:5050 \
            --region us-east-1 \
            --query "UserPoolClient.ClientId" --output text)

          # Seed data
          aws dynamodb put-item --table-name business \
            --item '{"name":{"S":"intrale"},"businessId":{"S":"intrale-001"},"publicId":{"S":"intrale"},"emailAdmin":{"S":"admin@intrale.com"},"description":{"S":"Intrale CI"},"state":{"S":"APPROVED"},"autoAcceptDeliveries":{"BOOL":false}}' \
            --endpoint-url http://localhost:8000 --region us-east-1

          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@intrale.com" \
            --temporary-password "Admin1234!" \
            --user-attributes Name=email,Value=admin@intrale.com Name=email_verified,Value=true \
            --endpoint-url http://localhost:5050 --region us-east-1 || true

          aws dynamodb put-item --table-name users \
            --item '{"email":{"S":"admin@intrale.com"},"name":{"S":"Admin"},"familyName":{"S":"Intrale"},"enabled":{"BOOL":true}}' \
            --endpoint-url http://localhost:8000 --region us-east-1

          aws dynamodb put-item --table-name userbusinessprofile \
            --item '{"compositeKey":{"S":"admin@intrale.com#intrale#DEFAULT"},"email":{"S":"admin@intrale.com"},"business":{"S":"intrale"},"profile":{"S":"DEFAULT"},"state":{"S":"APPROVED"}}' \
            --endpoint-url http://localhost:8000 --region us-east-1

          echo "USER_POOL_ID=$USER_POOL_ID" >> $GITHUB_ENV
          echo "CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV

      - name: Start backend
        env:
          LOCAL_MODE: "true"
          REGION_VALUE: us-east-1
          ACCESS_KEY_ID: local
          SECRET_ACCESS_KEY: local
          DYNAMODB_ENDPOINT: http://localhost:8000
          COGNITO_ENDPOINT: http://localhost:5050
        run: |
          ./gradlew :users:run &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"

          # Esperar healthcheck
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w '%{http_code}' -X POST http://localhost:80/intrale/signin -H 'Content-Type: application/json' -d '{}' 2>/dev/null || true)
            echo "Intento $i/30 — STATUS: $STATUS"
            if [ "$STATUS" = "400" ]; then
              echo "Backend listo"
              break
            fi
            sleep 3
          done

          if [ "$STATUS" != "400" ]; then
            echo "ERROR: Backend no respondió después de 90s"
            exit 1
          fi


      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E QA tests
        env:
          QA_BASE_URL: http://localhost:80
        run: ./gradlew :qa:test --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-e2e-reports
          path: |
            qa/build/reports/tests/
            qa/build/test-results/
          retention-days: 14

      - name: Upload recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-e2e-recordings
          path: qa/recordings/
          retention-days: 14
          if-no-files-found: ignore

  # ── Gate final — todos los checks deben pasar ───────────────────
  pr-status:
    runs-on: ubuntu-latest
    needs: [detect-changes, verify-strings, check-backend, check-users, check-app, check-tools, e2e-qa]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          echo "== PR Check Results =="
          echo "verify-strings: ${{ needs.verify-strings.result }}"
          echo "check-backend:  ${{ needs.check-backend.result }}"
          echo "check-users:    ${{ needs.check-users.result }}"
          echo "check-app:      ${{ needs.check-app.result }}"
          echo "check-tools:    ${{ needs.check-tools.result }}"
          echo "e2e-qa:         ${{ needs.e2e-qa.result }}"

          # Un job skipped es OK (no hubo cambios en ese módulo)
          # Un job con failure o cancelled es un error
          for result in \
            "${{ needs.verify-strings.result }}" \
            "${{ needs.check-backend.result }}" \
            "${{ needs.check-users.result }}" \
            "${{ needs.check-app.result }}" \
            "${{ needs.check-tools.result }}" \
            "${{ needs.e2e-qa.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "FAILED: al menos un check falló o fue cancelado"
              exit 1
            fi
          done
          echo "OK: todos los checks pasaron o fueron skipped correctamente"
