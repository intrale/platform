name: Distribución iOS — TestFlight (3 Flavors)

# Distribuye las 3 apps iOS (client, business, delivery) a TestFlight via fastlane.
#
# PRERREQUISITOS (ver docs/testflight-ios-setup.md):
#   - Apple Developer Program activo ($99/año)
#   - 3 App IDs registrados en App Store Connect
#   - Certificado de distribución + Provisioning Profiles generados
#   - Secrets configurados en GitHub (ver sección "env" de cada job)
#
# BLOQUEADOR ACTUAL: requiere Apple Developer Program. Ver issue #1465.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de release (visible en TestFlight)'
        required: false
        default: 'Build de Friends & Family'
      flavor:
        description: 'Flavor a distribuir'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - client
          - business
          - delivery

jobs:
  distribute-client:
    name: TestFlight — Intrale (client)
    if: ${{ github.event.inputs.flavor == 'all' || github.event.inputs.flavor == 'client' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app/iosApp

      - name: Build KMP iOS framework (arm64)
        run: |
          chmod +x gradlew
          ./gradlew :app:composeApp:linkReleaseFrameworkIosArm64 \
            -PAPP_TYPE=CLIENT \
            -x compileTestKotlinIosX64 \
            -x compileTestKotlinIosSimulatorArm64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Instalar certificado y provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_CLIENT_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_CLIENT_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Crear keychain temporal
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Importar certificado
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Instalar provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_CLIENT_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/client.mobileprovision

      - name: Subir a TestFlight via fastlane (client)
        working-directory: app/iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane distribute_client

  distribute-business:
    name: TestFlight — Intrale Negocios (business)
    if: ${{ github.event.inputs.flavor == 'all' || github.event.inputs.flavor == 'business' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app/iosApp

      - name: Build KMP iOS framework (arm64)
        run: |
          chmod +x gradlew
          ./gradlew :app:composeApp:linkReleaseFrameworkIosArm64 \
            -PAPP_TYPE=BUSINESS \
            -x compileTestKotlinIosX64 \
            -x compileTestKotlinIosSimulatorArm64

      - name: Instalar certificado y provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BUSINESS_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BUSINESS_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BUSINESS_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/business.mobileprovision

      - name: Subir a TestFlight via fastlane (business)
        working-directory: app/iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane distribute_business

  distribute-delivery:
    name: TestFlight — Intrale Repartos (delivery)
    if: ${{ github.event.inputs.flavor == 'all' || github.event.inputs.flavor == 'delivery' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app/iosApp

      - name: Build KMP iOS framework (arm64)
        run: |
          chmod +x gradlew
          ./gradlew :app:composeApp:linkReleaseFrameworkIosArm64 \
            -PAPP_TYPE=DELIVERY \
            -x compileTestKotlinIosX64 \
            -x compileTestKotlinIosSimulatorArm64

      - name: Instalar certificado y provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_DELIVERY_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_DELIVERY_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_DELIVERY_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/delivery.mobileprovision

      - name: Subir a TestFlight via fastlane (delivery)
        working-directory: app/iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane distribute_delivery

  notify:
    name: Notificar resultado
    needs: [distribute-client, distribute-business, distribute-delivery]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notificar por Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CLIENT_STATUS="${{ needs.distribute-client.result }}"
          BUSINESS_STATUS="${{ needs.distribute-business.result }}"
          DELIVERY_STATUS="${{ needs.distribute-delivery.result }}"

          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *) echo "⚠️" ;;
            esac
          }

          MESSAGE="iOS TestFlight — Build #${{ github.run_number }}
          $(status_icon $CLIENT_STATUS) Intrale (client)
          $(status_icon $BUSINESS_STATUS) Intrale Negocios (business)
          $(status_icon $DELIVERY_STATUS) Intrale Repartos (delivery)

          Testers: abrir TestFlight y actualizar las apps.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}"
