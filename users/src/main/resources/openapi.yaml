    invocan sobre la ruta dinámica `/{business}/{function...}` y devuelven el patrón
    `Response(statusCode, responseHeaders)`. El verbo HTTP real lo resuelve el backend por el
    header `X-Http-Method`. Ver docs/engineering/api-contract-standard.md.
