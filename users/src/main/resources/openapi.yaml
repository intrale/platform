components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Token JWT de Cognito enviado en el header `Authorization`. La UI lo mantiene sólo en
        memoria del navegador; nunca se persiste ni se registra en logs.
  schemas:
    Response:
      type: object
      description: Patrón base de respuesta del backend.
      properties:
        statusCode: { type: integer, example: 200 }
        responseHeaders: { type: object, additionalProperties: { type: string } }
    ExceptionResponse:
      type: object
      description: Respuesta de error uniforme.
      properties:
        statusCode: { type: integer, example: 400 }
        message: { type: string, example: 'Descripción del error' }
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: UP }
