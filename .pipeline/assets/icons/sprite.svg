<!--
  Intrale Pipeline V3 — Icon Sprite
  -----------------------------------------------------------------------------
  Sprite unico con todos los iconos del sistema como <symbol>. El dashboard
  incluye este sprite inline una vez y referencia cada icono con <use href="#ic-*" />.

  Convenciones:
    - ViewBox 24x24 (escala uniforme).
    - stroke="currentColor" — el color lo define el contexto CSS.
    - stroke-width="1.75" / fill="none" — estilo outline coherente.
    - stroke-linecap="round" stroke-linejoin="round" — acabado amigable.
    - id="ic-<categoria>-<estado>" — nombre predecible.

  Seguridad:
    - Sin <script>, <foreignObject>, ni atributos on*.
    - Sin href externos (http/https/javascript).
    - <use href="#id"> solo a fragmentos locales.

  Accesibilidad:
    - Cada <use> debe incluir aria-label descriptivo en el <svg> padre.
    - Los simbolos no llevan <title> propio para evitar tooltips nativos;
      el aria-label del contexto manda.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>
    <!-- Estilo base reutilizable -->
    <style>
      .ic-sprite symbol { overflow: visible; }
    </style>
  </defs>

  <!-- =========================================================================
       LOGO INTRALE (isotipo simplificado para header y branding)
       ========================================================================= -->
  <symbol id="ic-intrale-logo" viewBox="0 0 24 24">
    <!-- Triangulo equilatero exterior (el "A" del logo) -->
    <path d="M12 3 L3 19 L21 19 Z" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Triangulo interno rellenado -->
    <path d="M12 10 L8.8 15.3 L15.2 15.3 Z" fill="currentColor"/>
  </symbol>

  <!-- =========================================================================
       FASES DE DEFINICION
       ========================================================================= -->

  <!-- ic-fase-analisis: lupa (investigacion / guru) -->
  <symbol id="ic-fase-analisis" viewBox="0 0 24 24">
    <circle cx="10.5" cy="10.5" r="6" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M15 15 L20 20" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M8 10.5 L10 12.5 L13.5 9" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-fase-criterios: lista con checks (criterios de aceptacion / po+ux) -->
  <symbol id="ic-fase-criterios" viewBox="0 0 24 24">
    <rect x="4" y="3.5" width="16" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M8 8 L9.5 9.5 L12 7" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 13 L9.5 14.5 L12 12" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 8.5 L17 8.5 M14 13.5 L17 13.5 M8 18 L17 18" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ic-fase-sizing: regla graduada (estimacion / planner) -->
  <symbol id="ic-fase-sizing" viewBox="0 0 24 24">
    <rect x="2.5" y="8" width="19" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M6 8 L6 12 M10 8 L10 11 M14 8 L14 12 M18 8 L18 11" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- =========================================================================
       FASES DE DESARROLLO
       ========================================================================= -->

  <!-- ic-fase-validacion: escudo con check (validacion inicial) -->
  <symbol id="ic-fase-validacion" viewBox="0 0 24 24">
    <path d="M12 3 L20 6 V12 C20 16.5 16.5 19.5 12 21 C7.5 19.5 4 16.5 4 12 V6 Z"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
    <path d="M8.5 12 L11 14.5 L15.5 10" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-fase-dev: llaves de codigo (desarrollo) -->
  <symbol id="ic-fase-dev" viewBox="0 0 24 24">
    <path d="M9 7 L4 12 L9 17" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 7 L20 12 L15 17" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M13.5 5 L10.5 19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- ic-fase-build: caja apilada (build) -->
  <symbol id="ic-fase-build" viewBox="0 0 24 24">
    <path d="M12 3 L21 7.5 V16.5 L12 21 L3 16.5 V7.5 Z" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linejoin="round"/>
    <path d="M3 7.5 L12 12 L21 7.5" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linejoin="round"/>
    <path d="M12 12 L12 21" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- ic-fase-verificacion: checklist con lupa (verificacion post-build) -->
  <symbol id="ic-fase-verificacion" viewBox="0 0 24 24">
    <rect x="4" y="3" width="12" height="15" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M7 7 H13 M7 10 H13 M7 13 H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="16.5" cy="16.5" r="4" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M19.5 19.5 L22 22" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- ic-fase-linteo: escoba + lineas (lint / cleanup) -->
  <symbol id="ic-fase-linteo" viewBox="0 0 24 24">
    <path d="M14 3 L21 10 L17 14 L10 7 Z" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round"/>
    <path d="M10 7 L3 14 L5 19 L10 21 L17 14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M5 19 L8 16 M7 21 L10 18" stroke="currentColor" stroke-width="1.2"
          stroke-linecap="round"/>
  </symbol>

  <!-- ic-fase-aprobacion: thumbs up (code review approved) -->
  <symbol id="ic-fase-aprobacion" viewBox="0 0 24 24">
    <path d="M7 10 V20 H5 C4.4 20 4 19.6 4 19 V11 C4 10.4 4.4 10 5 10 Z"
          fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M7 10 L11 3 C11 3 13 3.5 13 6 C13 7.5 12 9 12 9 H18 C19.1 9 20 9.9 20 11
             L19 18 C19 19.1 18.1 20 17 20 H7"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-fase-entrega: camion / paquete delivery -->
  <symbol id="ic-fase-entrega" viewBox="0 0 24 24">
    <rect x="2" y="7" width="12" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M14 10 H18 L22 14 V17 H14 Z" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round"/>
    <circle cx="7" cy="18.5" r="1.75" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="17.5" cy="18.5" r="1.75" fill="none" stroke="currentColor" stroke-width="1.6"/>
  </symbol>

  <!-- =========================================================================
       ESTADOS TRANSVERSALES
       ========================================================================= -->

  <!-- ic-estado-rebote: flecha en U (rebote normal) -->
  <symbol id="ic-estado-rebote" viewBox="0 0 24 24">
    <path d="M6 8 V12 C6 15.3 8.7 18 12 18 H17"
          fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 15 L17 18 L14 21" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="5" r="2.5" fill="currentColor"/>
  </symbol>

  <!-- ic-estado-crossphase: dos flechas opuestas cruzando (rebote cross-phase #2516) -->
  <symbol id="ic-estado-crossphase" viewBox="0 0 24 24">
    <path d="M3 8 H17 L14 5 M17 8 L14 11" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 16 H7 L10 19 M7 16 L10 13" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-estado-partial-pause: pausa con candado pequeno (pausa parcial con allowlist) -->
  <symbol id="ic-estado-partial-pause" viewBox="0 0 24 24">
    <rect x="5" y="4" width="4" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <rect x="12" y="4" width="4" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <rect x="15" y="15" width="7" height="6" rx="1" fill="currentColor" opacity="0.18"/>
    <rect x="15" y="15" width="7" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M16.5 15 V13 C16.5 11.9 17.4 11 18.5 11 C19.6 11 20.5 11.9 20.5 13 V15"
          fill="none" stroke="currentColor" stroke-width="1.3"/>
  </symbol>

  <!-- ic-estado-circuit-breaker: tubo con linea de corte (circuit breaker abierto) -->
  <symbol id="ic-estado-circuit-breaker" viewBox="0 0 24 24">
    <path d="M3 12 H9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M15 12 H21" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M9 12 L14 7" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <circle cx="9" cy="12" r="1.8" fill="currentColor"/>
    <circle cx="15" cy="12" r="1.8" fill="currentColor"/>
    <path d="M18 5 L20 3 M20 5 L18 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </symbol>

  <!-- ic-estado-needs-human: figura con signo de pregunta (needs-human) -->
  <symbol id="ic-estado-needs-human" viewBox="0 0 24 24">
    <circle cx="10" cy="7" r="3.2" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M3.5 20 C3.5 16.4 6.4 13.5 10 13.5 C11.2 13.5 12.3 13.8 13.3 14.3"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <circle cx="18" cy="15" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M16.5 13.5 C16.5 12.5 17.2 12 18 12 C18.9 12 19.5 12.6 19.5 13.4
             C19.5 14.2 18.8 14.5 18.5 15 C18.2 15.4 18 15.8 18 16.3"
          fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="0.5" fill="currentColor"/>
  </symbol>

  <!-- ic-estado-voz-narrando: onda de sonido desde burbuja (voz narrando TTS #2518) -->
  <symbol id="ic-estado-voz-narrando" viewBox="0 0 24 24">
    <path d="M4 6 H12 C13.1 6 14 6.9 14 8 V13 C14 14.1 13.1 15 12 15 H9 L5 18.5 V15 H4 C2.9 15 2 14.1 2 13 V8 C2 6.9 2.9 6 4 6 Z"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
    <path d="M16 9 C17.3 9.6 18 10.7 18 12 C18 13.3 17.3 14.4 16 15"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19 6 C21 7.5 22 9.6 22 12 C22 14.4 21 16.5 19 18"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ic-estado-retrying: dos flechas circulares (retry #2337) -->
  <symbol id="ic-estado-retrying" viewBox="0 0 24 24">
    <path d="M4 12 C4 7.6 7.6 4 12 4 C15.2 4 18 5.9 19.2 8.7"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M19.5 4 V9 H14.5" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 12 C20 16.4 16.4 20 12 20 C8.8 20 6 18.1 4.8 15.3"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M4.5 20 V15 H9.5" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-estado-stale: reloj con lineas difusas (stale / sin actividad) -->
  <symbol id="ic-estado-stale" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M12 7 V12 L15 14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 4.5 V3 M12 21 V19.5 M4.5 12 H3 M21 12 H19.5" stroke="currentColor"
          stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  </symbol>

  <!-- =========================================================================
       EXTRAS UTILES (dashboard UX)
       ========================================================================= -->

  <!-- ic-health-ok: check-circle (sano) -->
  <symbol id="ic-health-ok" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M8 12.5 L11 15.5 L16 9.5" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-health-warn: triangulo alerta -->
  <symbol id="ic-health-warn" viewBox="0 0 24 24">
    <path d="M12 3 L22 20 H2 Z" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round"/>
    <path d="M12 9.5 V14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <circle cx="12" cy="17" r="0.9" fill="currentColor"/>
  </symbol>

  <!-- ic-agents-count: siluetas agrupadas (N agentes activos) -->
  <symbol id="ic-agents-count" viewBox="0 0 24 24">
    <circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M3 20 C3 16.7 5.7 14 9 14 C12.3 14 15 16.7 15 20" fill="none"
          stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <circle cx="17" cy="9" r="2.3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M14.5 19 C15 16.6 16.7 14.8 19 14.2 C20.8 14.7 22 16 22 18" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ic-issues-count: layers / pila de issues -->
  <symbol id="ic-issues-count" viewBox="0 0 24 24">
    <path d="M12 3 L21 8 L12 13 L3 8 Z" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linejoin="round"/>
    <path d="M3 12 L12 17 L21 12" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 16 L12 21 L21 16" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

</svg>
