    <text x="56" y="28" fill="#E6EDF3" font-size="13" font-weight="700">Configuración guardada</text>
    <text x="56" y="46" fill="#B1BAC4" font-size="11">Hot-reload aplicado · sin reinicio del pipeline</text>
  </g>

</svg>
