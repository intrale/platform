    <!-- ============== ACCIONES ============== -->
    <g transform="translate(0, 776)">
      <g transform="translate(620, 0)">
        <rect width="76" height="36" rx="8" fill="none" stroke="#30363D"/>
        <text x="38" y="23" fill="#B1BAC4" font-size="12" text-anchor="middle">Cancelar</text>
