<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 36 — Bloqueados → Triage Queue (EP8-H4, #3957)
  Resolucion target: 1080x1920 (kiosk vertical, consistente con 27-bloqueados-v3.svg)
  Narrativa: narrativa-bloqueados-h4.md
  Demuestra los 5 elementos NUEVOS de H4 sobre el modulo extraido en #3729:
    - Header con stats permanentes: SLA promedio de desbloqueo + resueltos hoy (CA-4).
    - Barra de filtros + busqueda client-side sobre filas ya escapadas (CA-1).
    - Orden severidad x edad: danger -> warning -> info, tie-break edad desc (CA-1).
    - Motivo pretty-print legible (nunca JSON crudo) (CA-2).
    - CTA primario explicito por fila: Aprobar / Reintentar / Responder (CA-5).
    - Deep-link Telegram "cuando aplica" (solo con bot_username valido) (CA-3).
  Iconografia: sprite.svg via <use href="#ic-..."> (representado aqui como glifos simples).
  Tokens: alineados con design-tokens.css. Sin tokens ni iconos nuevos (H4-D7).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920"
     font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D6FF"/>
      <stop offset="100%" stop-color="#1890FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D274D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#161B22" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Fondo kiosk -->
  <rect width="1080" height="1920" fill="#0D1117"/>

  <!-- Brand bar superior (fuera de scope, referencia de frame) -->
  <rect x="0" y="0" width="1080" height="68" fill="url(#headerGrad)"/>
  <rect x="0" y="67" width="1080" height="1" fill="#30363D"/>
  <g opacity="0.55">
    <circle cx="40" cy="34" r="14" fill="url(#brandGrad)"/>
    <text x="68" y="40" fill="#E6EDF3" font-size="20" font-weight="600">Intrale · Dashboard V3</text>
  </g>
  <text x="1040" y="40" fill="#8B949E" font-size="16" text-anchor="end">vista: bloqueados</text>

  <!-- ===================== PANEL bloqueados-view ===================== -->
  <rect x="32" y="100" width="1016" height="1760" rx="16" fill="#161B22" stroke="#30363D"/>

  <!-- ---------- HEADER (bloqueados-header) con stats permanentes (CA-4) ---------- -->
  <g>
    <rect x="32" y="100" width="1016" height="96" rx="16" fill="url(#headerGrad)"/>
    <!-- icono estado needs-human (pulse) -->
    <circle cx="78" cy="148" r="16" fill="rgba(248,81,73,0.14)" stroke="#F85149"/>
    <text x="78" y="155" fill="#F85149" font-size="22" font-weight="700" text-anchor="middle">!</text>
    <text x="112" y="142" fill="#E6EDF3" font-size="26" font-weight="700">Necesitan intervención humana</text>
    <!-- badge cantidad -->
    <rect x="560" y="124" width="44" height="34" rx="10" fill="#F85149"/>
    <text x="582" y="148" fill="#0D1117" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="112" y="172" fill="#8B949E" font-size="16">3 issues esperando una decisión</text>

    <!-- stat chips (renderHeaderStatsSsr) -->
    <g>
      <!-- SLA promedio -->
      <rect x="640" y="126" width="180" height="44" rx="10" fill="#1C2128" stroke="#30363D"/>
      <circle cx="664" cy="148" r="9" fill="none" stroke="#8B949E" stroke-width="2"/>
      <text x="664" y="152" fill="#8B949E" font-size="11" text-anchor="middle">⏱</text>
      <text x="682" y="143" fill="#8B949E" font-size="12">SLA promedio</text>
      <text x="682" y="162" fill="#E6EDF3" font-size="17" font-weight="600">4h 12m</text>
      <!-- resueltos hoy -->
      <rect x="832" y="126" width="160" height="44" rx="10" fill="#1C2128" stroke="#30363D"/>
      <circle cx="856" cy="148" r="9" fill="rgba(63,185,80,0.18)" stroke="#3FB950" stroke-width="2"/>
      <text x="856" y="152" fill="#3FB950" font-size="11" text-anchor="middle">✓</text>
      <text x="874" y="143" fill="#8B949E" font-size="12">Resueltos hoy</text>
      <text x="874" y="162" fill="#E6EDF3" font-size="17" font-weight="600">7</text>
    </g>
    <!-- chevron + popout (referencia) -->
    <text x="1018" y="155" fill="#8B949E" font-size="20" text-anchor="end">⇕  ↗</text>
  </g>

  <!-- ---------- FILTERBAR (bloqueados-filterbar) (CA-1) ---------- -->
  <g>
    <rect x="32" y="196" width="1016" height="64" fill="#1C2128"/>
    <rect x="32" y="259" width="1016" height="1" fill="#30363D"/>
    <!-- buscador con ic-search -->
    <rect x="56" y="212" width="320" height="34" rx="8" fill="#161B22" stroke="#30363D"/>
    <circle cx="76" cy="229" r="7" fill="none" stroke="#8B949E" stroke-width="2"/>
    <line x1="81" y1="234" x2="86" y2="239" stroke="#8B949E" stroke-width="2"/>
    <text x="96" y="234" fill="#6E7681" font-size="15">Buscar issue, skill, motivo…</text>
    <!-- select Severidad -->
    <rect x="392" y="212" width="170" height="34" rx="8" fill="#161B22" stroke="#30363D"/>
    <circle cx="410" cy="229" r="5" fill="#F85149"/>
    <text x="424" y="234" fill="#B1BAC4" font-size="15">Severidad</text>
    <text x="548" y="234" fill="#8B949E" font-size="13" text-anchor="end">▾</text>
    <!-- select Skill -->
    <rect x="574" y="212" width="150" height="34" rx="8" fill="#161B22" stroke="#30363D"/>
    <text x="590" y="234" fill="#B1BAC4" font-size="15">Skill</text>
    <text x="710" y="234" fill="#8B949E" font-size="13" text-anchor="end">▾</text>
    <!-- select Fase -->
    <rect x="736" y="212" width="150" height="34" rx="8" fill="#161B22" stroke="#30363D"/>
    <text x="752" y="234" fill="#B1BAC4" font-size="15">Fase</text>
    <text x="872" y="234" fill="#8B949E" font-size="13" text-anchor="end">▾</text>
    <!-- limpiar -->
    <text x="1022" y="234" fill="#58A6FF" font-size="15" text-anchor="end">✕ Limpiar filtros</text>
  </g>

  <!-- ===================== FILAS (orden severidad x edad) ===================== -->

  <!-- ----- ROW danger #2891 (rail rojo) — CTA Reintentar ----- -->
  <g>
    <rect x="56" y="284" width="968" height="200" rx="12" fill="#1C2128" stroke="#30363D"/>
    <rect x="56" y="284" width="6" height="200" rx="3" fill="#F85149"/>
    <!-- head -->
    <rect x="84" y="304" width="150" height="28" rx="8" fill="rgba(88,166,255,0.10)" stroke="#1F6FEB"/>
    <text x="98" y="323" fill="#58A6FF" font-size="14" font-weight="600">ⓤx · validacion</text>
    <text x="252" y="324" fill="#E6EDF3" font-size="19" font-weight="700">#2891</text>
    <text x="328" y="324" fill="#B1BAC4" font-size="18">Splash screen no respeta flavor business</text>
    <!-- pill edad danger -->
    <rect x="838" y="304" width="166" height="30" rx="15" fill="rgba(248,81,73,0.14)" stroke="#F85149"/>
    <text x="858" y="324" fill="#F85149" font-size="14" font-weight="600">⏱ hace 29h · danger</text>
    <!-- motivo prettyReason -->
    <text x="84" y="370" fill="#8B949E" font-size="15">Motivo:</text>
    <text x="156" y="370" fill="#B1BAC4" font-size="16">Rebote (build): falló la compilación del módulo users — assembleBusinessDebug</text>
    <!-- acciones: CTA primario Reintentar + secundarias -->
    <rect x="84" y="414" width="156" height="44" rx="10" fill="rgba(88,166,255,0.16)" stroke="#1F6FEB"/>
    <text x="108" y="441" fill="#58A6FF" font-size="17" font-weight="600">↻  Reintentar</text>
    <text x="262" y="441" fill="#8B949E" font-size="15">▶ Reactivar</text>
    <text x="384" y="441" fill="#8B949E" font-size="15">✕ Desestimar</text>
    <text x="528" y="441" fill="#58A6FF" font-size="15">↗ GitHub</text>
    <text x="636" y="441" fill="#00D6FF" font-size="15">✈ Telegram</text>
  </g>

  <!-- ----- ROW warning #3681 (rail ambar) — CTA Aprobar ----- -->
  <g>
    <rect x="56" y="500" width="968" height="200" rx="12" fill="#1C2128" stroke="#30363D"/>
    <rect x="56" y="500" width="6" height="200" rx="3" fill="#D29922"/>
    <rect x="84" y="520" width="150" height="28" rx="8" fill="rgba(88,166,255,0.10)" stroke="#1F6FEB"/>
    <text x="98" y="539" fill="#58A6FF" font-size="14" font-weight="600">guru · analisis</text>
    <text x="252" y="540" fill="#E6EDF3" font-size="19" font-weight="700">#3681</text>
    <text x="328" y="540" fill="#B1BAC4" font-size="18">Recomendación: cachear summaries de issues</text>
    <rect x="838" y="520" width="166" height="30" rx="15" fill="rgba(210,153,34,0.14)" stroke="#D29922"/>
    <text x="858" y="540" fill="#D29922" font-size="14" font-weight="600">⏱ hace 12h · warning</text>
    <text x="84" y="586" fill="#8B949E" font-size="15">Motivo:</text>
    <text x="156" y="586" fill="#B1BAC4" font-size="16">Aprobación pendiente: recomendación lista para go/no-go humano</text>
    <!-- CTA primario Aprobar (success) -->
    <rect x="84" y="630" width="140" height="44" rx="10" fill="rgba(63,185,80,0.16)" stroke="#196C2E"/>
    <text x="108" y="657" fill="#3FB950" font-size="17" font-weight="600">✓  Aprobar</text>
    <text x="246" y="657" fill="#8B949E" font-size="15">▶ Reactivar</text>
    <text x="368" y="657" fill="#8B949E" font-size="15">✕ Desestimar</text>
    <text x="512" y="657" fill="#58A6FF" font-size="15">↗ GitHub</text>
  </g>

  <!-- ----- ROW info #3754 (rail azul) — CTA Responder ----- -->
  <g>
    <rect x="56" y="716" width="968" height="200" rx="12" fill="#1C2128" stroke="#30363D"/>
    <rect x="56" y="716" width="6" height="200" rx="3" fill="#58A6FF"/>
    <rect x="84" y="736" width="180" height="28" rx="8" fill="rgba(88,166,255,0.10)" stroke="#1F6FEB"/>
    <text x="98" y="755" fill="#58A6FF" font-size="14" font-weight="600">architect · validacion</text>
    <text x="282" y="756" fill="#E6EDF3" font-size="19" font-weight="700">#3754</text>
    <text x="358" y="756" fill="#B1BAC4" font-size="18">Refactor de routing del dashboard</text>
    <rect x="838" y="736" width="166" height="30" rx="15" fill="rgba(88,166,255,0.14)" stroke="#58A6FF"/>
    <text x="858" y="756" fill="#58A6FF" font-size="14" font-weight="600">⏱ hace 47m · info</text>
    <text x="84" y="802" fill="#8B949E" font-size="15">Motivo:</text>
    <text x="156" y="802" fill="#B1BAC4" font-size="16">¿Confirmás el alcance del refactor antes de seguir con la migración?</text>
    <!-- CTA primario Responder (brand-cyan) -->
    <rect x="84" y="846" width="150" height="44" rx="10" fill="rgba(0,214,255,0.14)" stroke="#0099B8"/>
    <text x="108" y="873" fill="#00D6FF" font-size="17" font-weight="600">✉  Responder</text>
    <text x="256" y="873" fill="#8B949E" font-size="15">▶ Reactivar</text>
    <text x="378" y="873" fill="#8B949E" font-size="15">✕ Desestimar</text>
    <text x="522" y="873" fill="#58A6FF" font-size="15">↗ GitHub</text>
    <text x="630" y="873" fill="#00D6FF" font-size="15">✈ Telegram</text>
  </g>

  <!-- ===================== LEYENDA ===================== -->
  <g>
    <rect x="56" y="940" width="968" height="84" rx="12" fill="#161B22" stroke="#30363D"/>
    <text x="80" y="972" fill="#8B949E" font-size="14" font-weight="600">SEVERIDAD (dual-encoded)</text>
    <rect x="80" y="986" width="14" height="14" rx="3" fill="#58A6FF"/>
    <text x="102" y="998" fill="#B1BAC4" font-size="14">⏱ &lt;4h info</text>
    <rect x="210" y="986" width="14" height="14" rx="3" fill="#D29922"/>
    <text x="232" y="998" fill="#B1BAC4" font-size="14">4–24h warning</text>
    <rect x="372" y="986" width="14" height="14" rx="3" fill="#F85149"/>
    <text x="394" y="998" fill="#B1BAC4" font-size="14">≥24h danger</text>

    <line x1="560" y1="958" x2="560" y2="1008" stroke="#30363D"/>
    <text x="584" y="972" fill="#8B949E" font-size="14" font-weight="600">CTA PRIMARIO</text>
    <text x="584" y="998" fill="#3FB950" font-size="14">✓ Aprobar</text>
    <text x="694" y="998" fill="#58A6FF" font-size="14">↻ Reintentar</text>
    <text x="828" y="998" fill="#00D6FF" font-size="14">✉ Responder</text>
  </g>

  <!-- ===================== VARIANTE EMPTY-STATE ===================== -->
  <g>
    <rect x="56" y="1060" width="968" height="1" fill="#30363D"/>
    <text x="80" y="1096" fill="#6E7681" font-size="14" font-weight="600" letter-spacing="1">VARIANTE · EMPTY-STATE (state.bloqueados.length === 0)</text>
    <rect x="56" y="1116" width="968" height="220" rx="12" fill="#161B22" stroke="#196C2E"/>
    <circle cx="540" cy="1186" r="34" fill="rgba(63,185,80,0.14)" stroke="#3FB950" stroke-width="3"/>
    <path d="M524 1186 l10 11 l22 -24" fill="none" stroke="#3FB950" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="540" y="1250" fill="#E6EDF3" font-size="22" font-weight="700" text-anchor="middle">Nada esperando que alguien decida</text>
    <text x="540" y="1286" fill="#8B949E" font-size="17" text-anchor="middle">SLA promedio  2h 14m   ·   Resueltos hoy  7</text>
    <text x="540" y="1314" fill="#6E7681" font-size="14" text-anchor="middle">(las mismas stats viven en el header cuando hay incidentes — CA-4)</text>
  </g>

  <!-- ===================== NOTAS DE SEGURIDAD / IMPLEMENTACION ===================== -->
  <g>
    <rect x="56" y="1372" width="968" height="456" rx="12" fill="#0D1117" stroke="#30363D"/>
    <text x="80" y="1408" fill="#E6EDF3" font-size="17" font-weight="700">Reglas de implementación (de la receta + security + PO)</text>

    <text x="80" y="1448" fill="#58A6FF" font-size="15" font-weight="600">CA-2 · prettyReason</text>
    <text x="80" y="1474" fill="#B1BAC4" font-size="14">JSON estructurado → texto legible ES; value SIEMPRE por escapeHtmlText; sin innerHTML;</text>
    <text x="80" y="1496" fill="#B1BAC4" font-size="14">Object.keys() (no __proto__); acotar bytes+profundidad; texto plano se respeta tal cual.</text>

    <text x="80" y="1532" fill="#58A6FF" font-size="15" font-weight="600">CA-3 · Deep-link Telegram</text>
    <text x="80" y="1558" fill="#B1BAC4" font-size="14">Solo si telegram.bot_username válido (^[A-Za-z0-9_]{5,32}$). NUNCA bot_token. Icono ic-chat-send.</text>
    <text x="80" y="1580" fill="#B1BAC4" font-size="14">URL t.me/&lt;user&gt;?start=unblock_&lt;issue&gt; · payload [A-Za-z0-9_-] · rel=noopener noreferrer.</text>

    <text x="80" y="1616" fill="#58A6FF" font-size="15" font-weight="600">CA-1 · Filtros/búsqueda</text>
    <text x="80" y="1642" fill="#B1BAC4" font-size="14">Client-side sobre filas ya escapadas (dataset/textContent). Sin reconstruir innerHTML</text>
    <text x="80" y="1664" fill="#B1BAC4" font-size="14">desde el query. Empty filtrado por textContent. Orden: sortBySeverityAge (danger→info, edad desc).</text>

    <text x="80" y="1700" fill="#58A6FF" font-size="15" font-weight="600">CA-4 · Header stats</text>
    <text x="80" y="1726" fill="#B1BAC4" font-size="14">computeBloqueadosStats() lee activity-log.jsonl acotado (tail/N días), path constante,</text>
    <text x="80" y="1748" fill="#B1BAC4" font-size="14">devuelve solo agregados numéricos. Nunca líneas crudas del log al DOM.</text>

    <text x="80" y="1784" fill="#58A6FF" font-size="15" font-weight="600">CA-5 · CTA primario</text>
    <text x="80" y="1810" fill="#B1BAC4" font-size="14">Clasificador determinístico (reason+labels): Aprobar/Reintentar/Responder. Default Responder.</text>
  </g>
</svg>
