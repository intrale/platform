<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1180" viewBox="0 0 960 1180" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- ====================================================================
       EP8-H6 (#3959) · Matriz → heat-map interactivo
       Mockup UX V3 — paleta accesible (patrón + color), tendencias ▲▼,
       cuello de botella con texto, drill-down por celda.
       Paleta: theme.css (dark, identidad Intrale). NO inventa colores.
       ==================================================================== -->
  <defs>
    <!-- Patrones para distinguir estados SIN depender del color (CA-5) -->
    <!-- normal (1–4): puntos sutiles -->
    <pattern id="pat-normal" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="rgba(46,230,193,0.15)"/>
      <circle cx="3" cy="3" r="0.9" fill="rgba(46,230,193,0.55)"/>
    </pattern>
    <!-- hot (5+): rayado diagonal -->
    <pattern id="pat-hot" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="rgba(210,153,34,0.18)"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="rgba(210,153,34,0.7)" stroke-width="1.6"/>
    </pattern>
    <!-- cuello de botella: cross-hatch denso -->
    <pattern id="pat-neck" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="rgba(248,81,73,0.20)"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(248,81,73,0.85)" stroke-width="1.4"/>
      <line x1="3" y1="0" x2="3" y2="6" stroke="rgba(248,81,73,0.45)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- fondo -->
  <rect width="960" height="1180" fill="#0d1117"/>

  <!-- ===================== Encabezado ===================== -->
  <text x="40" y="52" fill="#e6edf3" font-size="22" font-weight="700">📈 Matriz · skill × fase (carga actual)</text>
  <text x="40" y="78" fill="#8b949e" font-size="13">Heat-map operable: saltar al detalle de issues, leer tendencia y ubicar el cuello de botella sin interpretar números.</text>
  <line x1="40" y1="96" x2="920" y2="96" stroke="#30363d" stroke-width="1"/>

  <!-- ===================== Leyenda accesible (CA-5) ===================== -->
  <text x="40" y="130" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="0.6" >LEYENDA — patrón + símbolo además de color (apto daltonismo)</text>

  <!-- swatch: sin carga -->
  <rect x="40" y="142" width="18" height="18" rx="3" fill="#161b22" stroke="#30363d"/>
  <text x="49" y="156" fill="#6e7681" font-size="12" text-anchor="middle">·</text>
  <text x="66" y="156" fill="#8b949e" font-size="12">Sin carga</text>

  <!-- swatch: normal -->
  <rect x="190" y="142" width="18" height="18" rx="3" fill="url(#pat-normal)" stroke="#2ee6c1"/>
  <text x="199" y="156" fill="#2ee6c1" font-size="11" text-anchor="middle">●</text>
  <text x="216" y="156" fill="#8b949e" font-size="12">1–4 · carga normal</text>

  <!-- swatch: hot -->
  <rect x="392" y="142" width="18" height="18" rx="3" fill="url(#pat-hot)" stroke="#d29922"/>
  <text x="401" y="156" fill="#d29922" font-size="11" text-anchor="middle">◣</text>
  <text x="418" y="156" fill="#8b949e" font-size="12">5+ · carga alta</text>

  <!-- swatch: cuello de botella -->
  <rect x="560" y="142" width="18" height="18" rx="3" fill="url(#pat-neck)" stroke="#f85149"/>
  <text x="569" y="156" fill="#f85149" font-size="11" text-anchor="middle">▦</text>
  <text x="587" y="156" fill="#8b949e" font-size="12">⚠ cuello de botella (máx. conteo × edad)</text>

  <!-- tendencias -->
  <text x="40" y="186" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="0.6">TENDENCIA vs 24h (el glifo es la señal, no el color)</text>
  <text x="40" y="206" fill="#f85149" font-size="13">▲</text><text x="58" y="206" fill="#8b949e" font-size="12">subió</text>
  <text x="140" y="206" fill="#3fb950" font-size="13">▼</text><text x="158" y="206" fill="#8b949e" font-size="12">bajó</text>
  <text x="240" y="206" fill="#8b949e" font-size="13">▬</text><text x="258" y="206" fill="#8b949e" font-size="12">estable</text>
  <text x="360" y="206" fill="#6e7681" font-size="12">(sin flecha = sin dato de 24h)</text>

  <!-- ===================== Tabla heat-map ===================== -->
  <!-- header de columnas -->
  <g font-size="10" font-weight="600" fill="#8b949e">
    <rect x="40" y="226" width="170" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="52" y="247" letter-spacing="0.6">SKILL</text>
    <rect x="210" y="226" width="120" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="270" y="247" text-anchor="middle">D:CRITERIOS</text>
    <rect x="330" y="226" width="120" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="390" y="247" text-anchor="middle">D:VALIDACIÓN</text>
    <rect x="450" y="226" width="120" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="510" y="247" text-anchor="middle">DEV:DESARROLLO</text>
    <rect x="570" y="226" width="120" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="630" y="247" text-anchor="middle">DEV:VERIFIC.</text>
    <rect x="690" y="226" width="120" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="750" y="247" text-anchor="middle">DEV:APROBAC.</text>
    <rect x="810" y="226" width="80" height="34" fill="#1f2937" stroke="#30363d"/>
    <text x="850" y="247" text-anchor="middle">TOTAL</text>
  </g>

  <!-- helper visual de fila: skill label + celdas -->
  <!-- Fila 1: po -->
  <g font-size="13">
    <rect x="40" y="260" width="170" height="40" fill="#1f2937" stroke="#30363d"/>
    <text x="52" y="285" fill="#2ee6c1">⚙</text><text x="72" y="285" fill="#e6edf3">po</text>
    <!-- celda normal con count 2 y ▼ -->
    <rect x="210" y="260" width="120" height="40" fill="url(#pat-normal)" stroke="#30363d"/>
    <text x="262" y="285" fill="#e6edf3" font-weight="600">2</text>
    <text x="288" y="285" fill="#3fb950" font-size="12">▼</text>
    <!-- vacías -->
    <rect x="330" y="260" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="390" y="285" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="450" y="260" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="510" y="285" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="570" y="260" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="630" y="285" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="690" y="260" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="750" y="285" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="810" y="260" width="80" height="40" fill="#1f2937" stroke="#30363d"/><text x="850" y="285" fill="#e6edf3" font-weight="700" text-anchor="middle">2</text>
  </g>

  <!-- Fila 2: android-dev (con cuello de botella) -->
  <g font-size="13">
    <rect x="40" y="300" width="170" height="40" fill="#1f2937" stroke="#30363d"/>
    <text x="52" y="325" fill="#58a6ff">⚙</text><text x="72" y="325" fill="#e6edf3">android-dev</text>
    <rect x="210" y="300" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="270" y="325" fill="#6e7681" text-anchor="middle">·</text>
    <!-- CUELLO DE BOTELLA: count 7, ▲, badge -->
    <rect x="330" y="300" width="120" height="40" fill="url(#pat-neck)" stroke="#f85149" stroke-width="2"/>
    <text x="346" y="325" fill="#e6edf3" font-weight="700">7</text>
    <text x="366" y="325" fill="#f85149" font-size="12">▲</text>
    <rect x="380" y="309" width="66" height="22" rx="11" fill="#f85149"/>
    <text x="413" y="324" fill="#0d1117" font-size="9" font-weight="700" text-anchor="middle">⚠ cuello</text>
    <rect x="450" y="300" width="120" height="40" fill="url(#pat-normal)" stroke="#30363d"/><text x="502" y="325" fill="#e6edf3" font-weight="600">3</text><text x="528" y="325" fill="#8b949e" font-size="12">▬</text>
    <rect x="570" y="300" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="630" y="325" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="690" y="300" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="750" y="325" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="810" y="300" width="80" height="40" fill="#1f2937" stroke="#30363d"/><text x="850" y="325" fill="#e6edf3" font-weight="700" text-anchor="middle">10</text>
  </g>

  <!-- Fila 3: backend-dev (hot 5) -->
  <g font-size="13">
    <rect x="40" y="340" width="170" height="40" fill="#1f2937" stroke="#30363d"/>
    <text x="52" y="365" fill="#3fb950">⚙</text><text x="72" y="365" fill="#e6edf3">backend-dev</text>
    <rect x="210" y="340" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="270" y="365" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="330" y="340" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="390" y="365" fill="#6e7681" text-anchor="middle">·</text>
    <!-- hot 5 ▲ -->
    <rect x="450" y="340" width="120" height="40" fill="url(#pat-hot)" stroke="#d29922"/>
    <text x="502" y="365" fill="#e6edf3" font-weight="600">5</text>
    <text x="528" y="365" fill="#d29922" font-size="12">▲</text>
    <rect x="570" y="340" width="120" height="40" fill="url(#pat-normal)" stroke="#30363d"/><text x="622" y="365" fill="#e6edf3" font-weight="600">1</text><text x="648" y="365" fill="#3fb950" font-size="12">▼</text>
    <rect x="690" y="340" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="750" y="365" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="810" y="340" width="80" height="40" fill="#1f2937" stroke="#30363d"/><text x="850" y="365" fill="#e6edf3" font-weight="700" text-anchor="middle">6</text>
  </g>

  <!-- Fila 4: ux (con foco de teclado visible) -->
  <g font-size="13">
    <rect x="40" y="380" width="170" height="40" fill="#1f2937" stroke="#30363d"/>
    <text x="52" y="405" fill="#a371f7">⚙</text><text x="72" y="405" fill="#e6edf3">ux</text>
    <!-- celda con anillo de foco (teclado) -->
    <rect x="210" y="380" width="120" height="40" fill="url(#pat-normal)" stroke="#30363d"/>
    <rect x="212" y="382" width="116" height="36" rx="3" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="0"/>
    <text x="262" y="405" fill="#e6edf3" font-weight="600">1</text>
    <text x="288" y="405" fill="#8b949e" font-size="12">▬</text>
    <text x="218" y="375" fill="#58a6ff" font-size="9">foco teclado ⏎/Espacio → abre panel</text>
    <rect x="330" y="380" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="390" y="405" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="450" y="380" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="510" y="405" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="570" y="380" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="630" y="405" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="690" y="380" width="120" height="40" fill="#161b22" stroke="#30363d"/><text x="750" y="405" fill="#6e7681" text-anchor="middle">·</text>
    <rect x="810" y="380" width="80" height="40" fill="#1f2937" stroke="#30363d"/><text x="850" y="405" fill="#e6edf3" font-weight="700" text-anchor="middle">1</text>
  </g>

  <!-- totals row -->
  <g font-size="12" font-weight="600" fill="#8b949e">
    <rect x="40" y="420" width="170" height="34" fill="#1f2937" stroke="#30363d" stroke-width="0"/>
    <line x1="40" y1="420" x2="890" y2="420" stroke="#30363d" stroke-width="2"/>
    <text x="52" y="442">Total fase</text>
    <text x="270" y="442" text-anchor="middle">2</text>
    <text x="390" y="442" text-anchor="middle">7</text>
    <text x="510" y="442" text-anchor="middle">8</text>
    <text x="630" y="442" text-anchor="middle">1</text>
    <text x="750" y="442" text-anchor="middle">0</text>
    <text x="850" y="442" text-anchor="middle" fill="#e6edf3">19</text>
  </g>

  <!-- nota orden de skills -->
  <text x="40" y="482" fill="#6e7681" font-size="11">CA-4 · orden de skills = fuente única (skill-catalog.js), idéntico a Pipeline y Equipo (por categoría).</text>

  <!-- ===================== Drill-down panel (dialog modal) ===================== -->
  <text x="40" y="528" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="0.6">CA-1 — DRILL-DOWN: click/Enter en celda con carga abre &lt;dialog&gt; modal (focus trap nativo, cierra con Esc)</text>

  <!-- backdrop -->
  <rect x="40" y="544" width="880" height="560" rx="6" fill="rgba(0,0,0,0.55)"/>
  <!-- dialog -->
  <rect x="300" y="568" width="600" height="512" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- dialog header -->
  <text x="328" y="606" fill="#e6edf3" font-size="16" font-weight="700">android-dev × dev/desarrollo</text>
  <rect x="328" y="618" width="92" height="22" rx="11" fill="url(#pat-neck)" stroke="#f85149"/>
  <text x="374" y="633" fill="#f85149" font-size="10" font-weight="700" text-anchor="middle">⚠ cuello de botella</text>
  <text x="430" y="634" fill="#8b949e" font-size="12">7 issues · edad media 3.2 días</text>
  <!-- close -->
  <text x="868" y="606" fill="#8b949e" font-size="18" font-weight="700">✕</text>
  <line x1="328" y1="652" x2="872" y2="652" stroke="#30363d"/>

  <!-- lista de issues — número (mono) + título (textContent) + pill estado + edad -->
  <g font-size="13">
    <!-- row 1 -->
    <text x="328" y="684" fill="#58a6ff" font-family="ui-monospace, monospace">#3960</text>
    <text x="400" y="684" fill="#e6edf3">Drawer de detalle con timeline de fases</text>
    <rect x="760" y="671" width="62" height="20" rx="10" fill="rgba(46,230,193,0.15)" stroke="#2ee6c1"/>
    <text x="791" y="685" fill="#2ee6c1" font-size="10" text-anchor="middle">en curso</text>
    <text x="834" y="684" fill="#8b949e" font-size="11">5d</text>
    <line x1="328" y1="700" x2="872" y2="700" stroke="#21262d"/>

    <!-- row 2 -->
    <text x="328" y="728" fill="#58a6ff" font-family="ui-monospace, monospace">#3961</text>
    <text x="400" y="728" fill="#e6edf3">Filtro por flavor en la lista de pedidos</text>
    <rect x="760" y="715" width="62" height="20" rx="10" fill="rgba(210,153,34,0.18)" stroke="#d29922"/>
    <text x="791" y="729" fill="#d29922" font-size="10" text-anchor="middle">rebote</text>
    <text x="834" y="728" fill="#8b949e" font-size="11">4d</text>
    <line x1="328" y1="744" x2="872" y2="744" stroke="#21262d"/>

    <!-- row 3 -->
    <text x="328" y="772" fill="#58a6ff" font-family="ui-monospace, monospace">#3962</text>
    <text x="400" y="772" fill="#e6edf3">Splash por flavor (client/business/delivery)</text>
    <rect x="760" y="759" width="62" height="20" rx="10" fill="rgba(46,230,193,0.15)" stroke="#2ee6c1"/>
    <text x="791" y="773" fill="#2ee6c1" font-size="10" text-anchor="middle">en curso</text>
    <text x="834" y="772" fill="#8b949e" font-size="11">3d</text>
    <line x1="328" y1="788" x2="872" y2="788" stroke="#21262d"/>

    <!-- row 4 -->
    <text x="328" y="816" fill="#58a6ff" font-family="ui-monospace, monospace">#3963</text>
    <text x="400" y="816" fill="#e6edf3">Estados vacíos con ilustración</text>
    <text x="834" y="816" fill="#8b949e" font-size="11">2d</text>
    <line x1="328" y1="832" x2="872" y2="832" stroke="#21262d"/>
  </g>

  <text x="328" y="868" fill="#6e7681" font-size="11">… 3 más · render con textContent/createElement (sin innerHTML de datos externos · invariante XSS)</text>

  <!-- footer del dialog -->
  <line x1="328" y1="1024" x2="872" y2="1024" stroke="#30363d"/>
  <rect x="328" y="1040" width="170" height="28" rx="6" fill="none" stroke="#30363d"/>
  <text x="413" y="1058" fill="#58a6ff" font-size="11" text-anchor="middle">Ver en GitHub (href /^\d+$/) ↗</text>
  <rect x="788" y="1040" width="84" height="28" rx="6" fill="#1f6feb"/>
  <text x="830" y="1058" fill="#fff" font-size="12" text-anchor="middle">Cerrar (Esc)</text>

  <!-- pie -->
  <text x="40" y="1140" fill="#6e7681" font-size="11">Mockup UX V3 · #3959 EP8-H6 · paleta theme.css (dark) · READ-ONLY (sin form/POST) · accesible por patrón + símbolo + aria-label</text>
  <text x="40" y="1162" fill="#6e7681" font-size="11">Datos server-authoritative: matrixIssues / matrixAgeAvg / matrixTrend / skillOrder calculados en pipelineSlice. El cliente solo dibuja.</text>
</svg>
