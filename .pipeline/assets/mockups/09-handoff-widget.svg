    <path d="M64 220 L168 195 L272 175 L376 165 L480 138 L584 120 L688 105 L780 95 L780 260 L64 260 Z"
          fill="url(#sparkGradHO)"/>
    <!-- Linea de tendencia -->
    <path d="M64 220 L168 195 L272 175 L376 165 L480 138 L584 120 L688 105 L780 95"
          fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Puntos de muestra -->
