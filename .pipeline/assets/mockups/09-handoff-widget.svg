    <line x1="16" y1="42" x2="520" y2="42" stroke="#30363D"/>

    <!-- Row 1 -->
    <g transform="translate(16, 58)" font-size="13">
      <text fill="#E6EDF3" font-weight="600">#2993</text>
      <text x="52" fill="#B1BAC4">Handoff cross-agente</text>
      <text x="240" fill="#B1BAC4" font-size="12">guru·sec·po·ux</text>
      <text x="346" fill="#2DD4BF" font-weight="600">112 k</text>
      <g transform="translate(438, -12)">
        <rect width="78" height="22" rx="11" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.35"/>
        <text x="39" y="15" fill="#2DD4BF" font-size="11" font-weight="600" text-anchor="middle">activo</text>
