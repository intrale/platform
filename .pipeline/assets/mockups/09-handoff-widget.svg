      <circle cx="64"  cy="220" r="3.5"/>
      <circle cx="168" cy="195" r="3.5"/>
      <circle cx="272" cy="175" r="3.5"/>
      <circle cx="376" cy="165" r="3.5"/>
      <circle cx="480" cy="138" r="3.5"/>
      <circle cx="584" cy="120" r="3.5"/>
      <circle cx="688" cy="105" r="3.5"/>
      <circle cx="780" cy="95"  r="4.5" fill="#2DD4BF"/>
    </g>

    <!-- X labels (dias) -->
