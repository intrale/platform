      <text x="168" y="282">D-6</text>
      <text x="272" y="282">D-5</text>
      <text x="376" y="282">D-4</text>
      <text x="480" y="282">D-3</text>
      <text x="584" y="282">D-2</text>
      <text x="688" y="282">D-1</text>
      <text x="780" y="282">hoy</text>
    </g>

    <!-- Tooltip "hoy" enfatizado -->
