      <rect width="76" height="32" rx="6" fill="#252B33" stroke="#2DD4BF" stroke-opacity="0.45"/>
      <text x="38" y="14" fill="#8B949E" font-size="10" text-anchor="middle">hoy</text>
      <text x="38" y="26" fill="#2DD4BF" font-size="13" font-weight="700" text-anchor="middle">68 %</text>
    </g>
  </g>

  <!-- ===================== Top 5 issues por ahorro ===================== -->
  <text x="872" y="412" fill="#8B949E" font-size="12" font-weight="600" letter-spacing="2">TOP 5 ISSUES POR AHORRO</text>

  <g transform="translate(872, 430)">
    <rect width="536" height="320" rx="10" fill="#161B22" stroke="#30363D"/>

