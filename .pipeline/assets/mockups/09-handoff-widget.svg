    </g>
    <line x1="16" y1="78" x2="520" y2="78" stroke="#21262D"/>

    <!-- Row 2 -->
    <g transform="translate(16, 92)" font-size="13">
      <text fill="#E6EDF3" font-weight="600">#2955</text>
      <text x="52" fill="#B1BAC4">Cuota Anthropic agotada</text>
      <text x="240" fill="#B1BAC4" font-size="12">guru·sec·po</text>
      <text x="346" fill="#2DD4BF" font-weight="600">86 k</text>
      <g transform="translate(438, -12)">
        <rect width="78" height="22" rx="11" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.35"/>
