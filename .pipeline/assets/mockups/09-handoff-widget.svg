<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 09 — Widget de Handoff cross-agente (#2993)
  -------------------------------------------------------------------
  Demuestra:
    - KPI compactos: % hit rate del handoff, tokens ahorrados, issues con handoff valido vs fallback
    - Sparkline de tendencia (7 dias) — coherente con widget de Consumo (mockup 03)
    - Lista de top 5 issues por ahorro estimado
    - Estado kill-switch (CA-B7) y flag enabled/disabled (CA-D1)
    - Banda de auditoria (CA-B7) que muestra ultimo write al handoff y eventos de seguridad

  Sistema visual:
    - 100% reuso de design-tokens.css (sin nuevos tonos de marca)
    - Acento del widget: --teal (#2DD4BF) — alineado con identidad V3
    - Estado "kill-switch activado": --quota-degraded (#F0A500) — coherente con #2955
    - Estado "fallback a issue": --warning (#D29922) — coherente con stale generico
    - Iconos: <use href="#ic-handoff"> y <use href="#ic-tokens-saved"> del sprite extendido

  Accesibilidad:
    - Contraste verificado: textos primarios 14.8:1, secundarios 9.7:1, dim 5.3:1
    - Sin informacion solo por color: cada estado tiene icono + texto
    - aria-label sobre cada figure y boton (en la implementacion real)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900"
     font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
     role="img" aria-label="Mockup widget handoff cross-agente para dashboard pipeline V3">
  <defs>
    <linearGradient id="brandGradHO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D6FF"/>
      <stop offset="100%" stop-color="#1890FF"/>
    </linearGradient>
    <linearGradient id="tealGradHO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="sparkGradHO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo dashboard -->
  <rect width="1440" height="900" fill="#0D1117"/>

  <!-- ===================== Header compacto ===================== -->
  <rect x="0" y="0" width="1440" height="60" fill="#161B22"/>
  <rect x="0" y="59" width="1440" height="1" fill="#30363D"/>
  <g transform="translate(32, 18)">
    <rect width="26" height="26" rx="7" fill="#0D274D"/>
    <path d="M13 5.5 L4 21 L22 21 Z" fill="none" stroke="url(#brandGradHO)" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M13 12 L9 19 L17 19 Z" fill="url(#brandGradHO)"/>
  </g>
  <text x="66" y="38" fill="#E6EDF3" font-size="16" font-weight="700">Intrale Pipeline</text>
  <text x="230" y="38" fill="#8B949E" font-size="13">· Consumo V3</text>

  <!-- Indicador kill-switch (top-right) -->
  <g transform="translate(1200, 16)">
    <rect width="208" height="28" rx="14" fill="#161B22" stroke="#30363D"/>
    <circle cx="16" cy="14" r="4" fill="#3FB950"/>
    <text x="28" y="18" fill="#B1BAC4" font-size="12">handoff:</text>
    <text x="76" y="18" fill="#3FB950" font-size="12" font-weight="700">activo</text>
    <text x="120" y="18" fill="#8B949E" font-size="11">· kill-switch OFF</text>
  </g>

  <!-- ===================== Breadcrumb + titulo ===================== -->
  <g transform="translate(32, 94)" font-size="13">
    <text fill="#8B949E">Dashboard</text>
    <text x="72" fill="#8B949E">›</text>
    <text x="86" fill="#8B949E">Consumo</text>
    <text x="160" fill="#8B949E">›</text>
    <text x="174" fill="#E6EDF3" font-weight="600">Handoff cross-agente</text>
  </g>

  <text x="32" y="152" fill="#E6EDF3" font-size="26" font-weight="700">Handoff cross-agente</text>
  <text x="32" y="178" fill="#8B949E" font-size="14">Ultimos 7 dias · actualizado hace 8 s · SSE conectado · #2993</text>

  <!-- Filtros de ventana -->
  <g transform="translate(32, 202)" font-size="12" font-weight="600">
    <g><rect width="58" height="30" rx="15" fill="#2DD4BF" fill-opacity="0.18" stroke="#2DD4BF" stroke-opacity="0.45"/>
       <text x="29" y="20" fill="#2DD4BF" text-anchor="middle">7 dias</text></g>
    <g transform="translate(68, 0)"><rect width="50" height="30" rx="15" fill="#161B22" stroke="#30363D"/>
       <text x="25" y="20" fill="#B1BAC4" text-anchor="middle">24h</text></g>
    <g transform="translate(128, 0)"><rect width="58" height="30" rx="15" fill="#161B22" stroke="#30363D"/>
       <text x="29" y="20" fill="#B1BAC4" text-anchor="middle">Mes</text></g>
  </g>

  <!-- ===================== 4 KPI cards principales ===================== -->
  <g transform="translate(32, 252)">

    <!-- KPI 1: Hit rate del handoff -->
    <g>
      <rect width="332" height="120" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect width="332" height="4" rx="2" fill="#2DD4BF"/>
      <!-- Icono ic-handoff (inline preview, en runtime usa <use href="#ic-handoff">) -->
      <g transform="translate(16, 18)" stroke="#2DD4BF" stroke-width="1.6" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="3"/>
        <circle cx="18" cy="18" r="3"/>
        <path d="M9 6 H14 L17 9"/>
        <path d="M15 18 H10 L7 15"/>
      </g>
      <text x="44" y="32" fill="#8B949E" font-size="11" font-weight="600" letter-spacing="1">HIT RATE HANDOFF</text>
      <text x="16" y="74" fill="#E6EDF3" font-size="32" font-weight="700">68 %</text>
      <g transform="translate(16, 92)" font-size="11">
        <text fill="#3FB950" font-weight="600">↑ 14 %</text>
        <text x="42" fill="#8B949E">vs semana previa</text>
      </g>
      <text x="16" y="112" fill="#8B949E" font-size="10">187 invocaciones · 127 leyeron handoff valido</text>
    </g>

    <!-- KPI 2: Tokens ahorrados -->
    <g transform="translate(344, 0)">
      <rect width="332" height="120" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect width="332" height="4" rx="2" fill="#58A6FF"/>
      <g transform="translate(16, 18)" stroke="#58A6FF" stroke-width="1.6" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M9 12 L11 14 L15 10"/>
        <path d="M12 3 V6 M12 18 V21 M3 12 H6 M18 12 H21" stroke-width="1.2" opacity="0.6"/>
      </g>
      <text x="44" y="32" fill="#8B949E" font-size="11" font-weight="600" letter-spacing="1">TOKENS AHORRADOS</text>
      <text x="16" y="74" fill="#E6EDF3" font-size="32" font-weight="700">412 k</text>
      <text x="16" y="92" fill="#58A6FF" font-size="11">≈ US$ 3.18 estimado · 7 dias</text>
      <text x="16" y="112" fill="#8B949E" font-size="10">in 198k · saved 412k · ratio 1:2.08</text>
    </g>

    <!-- KPI 3: Issues con handoff vs fallback -->
    <g transform="translate(688, 0)">
      <rect width="332" height="120" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect width="332" height="4" rx="2" fill="#BC8CFF"/>
      <text x="16" y="32" fill="#8B949E" font-size="11" font-weight="600" letter-spacing="1">ISSUES PROCESADOS</text>
      <text x="16" y="74" fill="#E6EDF3" font-size="32" font-weight="700">23</text>
      <g transform="translate(16, 92)" font-size="11">
        <rect width="10" height="10" rx="2" fill="#2DD4BF"/>
        <text x="16" y="9" fill="#B1BAC4">19 con handoff valido</text>
      </g>
      <g transform="translate(16, 110)" font-size="11">
        <rect width="10" height="10" rx="2" fill="#D29922"/>
        <text x="16" y="9" fill="#B1BAC4">4 cayeron a fallback (issue completo)</text>
      </g>
    </g>

    <!-- KPI 4: Eventos de seguridad (CA-B1, CA-B3, CA-B7) -->
    <g transform="translate(1032, 0)">
      <rect width="332" height="120" rx="10" fill="#161B22" stroke="#30363D"/>
      <rect width="332" height="4" rx="2" fill="#3FB950"/>
      <text x="16" y="32" fill="#8B949E" font-size="11" font-weight="600" letter-spacing="1">AUDITORIA · 7 DIAS</text>
      <text x="16" y="74" fill="#E6EDF3" font-size="32" font-weight="700">0</text>
      <text x="16" y="92" fill="#3FB950" font-size="11">prompt-injection detectado</text>
      <text x="16" y="110" fill="#8B949E" font-size="10">2 secrets redactados · 1 seccion truncada (10kb)</text>
    </g>
  </g>

  <!-- ===================== Sparkline de tendencia ===================== -->
  <text x="32" y="412" fill="#8B949E" font-size="12" font-weight="600" letter-spacing="2">HIT RATE DEL HANDOFF · TENDENCIA 7 DIAS</text>

  <g transform="translate(32, 430)">
    <rect width="820" height="320" rx="10" fill="#161B22" stroke="#30363D"/>

    <!-- Ejes -->
    <line x1="64" y1="40" x2="64" y2="260" stroke="#30363D" stroke-width="1"/>
    <line x1="64" y1="260" x2="780" y2="260" stroke="#30363D" stroke-width="1"/>

    <!-- Y labels (porcentaje) -->
    <g font-size="11" fill="#8B949E" text-anchor="end">
      <text x="56" y="44">100%</text>
      <text x="56" y="100">75%</text>
      <text x="56" y="156">50%</text>
      <text x="56" y="212">25%</text>
      <text x="56" y="264">0%</text>
    </g>

    <!-- Linea umbral del 50% (configurable) -->
    <line x1="64" y1="156" x2="780" y2="156" stroke="#D29922" stroke-width="1"
