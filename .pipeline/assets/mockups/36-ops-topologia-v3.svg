    <rect x="0" y="61" width="1440" height="1" fill="#21262D"/>
    <circle cx="36" cy="31" r="9" fill="url(#brandGrad)"/>
    <circle cx="36" cy="31" r="4" fill="#3FB950"/>
    <text x="58" y="37" font-size="17" font-weight="700" letter-spacing="0.5">
