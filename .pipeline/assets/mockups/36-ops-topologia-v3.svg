      <text x="916" y="124" fill="#B1BAC4">duplicado</text>
      <rect x="982" y="116" width="240" height="9" rx="4.5" fill="#21262D"/>
      <rect x="982" y="116" width="170" height="9" rx="4.5" fill="url(#barDup)"/>
      <text x="1408" y="124" text-anchor="end" fill="#B1BAC4">91</text>

      <text x="916" y="139" fill="#B1BAC4">timeout</text>
      <rect x="982" y="131" width="240" height="9" rx="4.5" fill="#21262D"/>
      <rect x="982" y="131" width="77" height="9" rx="4.5" fill="#D29922"/>
      <text x="1408" y="139" text-anchor="end" fill="#B1BAC4">41</text>

      <text x="916" y="154" fill="#B1BAC4">validación</text>
      <rect x="982" y="146" width="240" height="9" rx="4.5" fill="#21262D"/>
      <rect x="982" y="146" width="28" height="9" rx="4.5" fill="#F85149"/>
