    </text>
    <text x="250" y="37" font-size="13" fill="#8B949E">Ops · topología de servicios</text>
    <circle cx="452" cy="33" r="3.5" fill="#3FB950"/>
    <text x="462" y="37" font-size="12" fill="#3FB950">actualizado hace 3 s</text>
    <!-- nav tabs -->
