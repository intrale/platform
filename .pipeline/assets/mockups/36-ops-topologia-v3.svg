<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 36 — EP8-H7 (#3960): Ops, topologia de servicios con log inline y
  restart auditado.
  =============================================================================
  Mockup OBJETIVO de la fase definicion/criterios. Referencia visual de alta
  fidelidad que implementa `pipeline-dev` sobre `.pipeline/views/dashboard/ops.js`
  (modulo SSR + polling ya existente, #3732) y `.pipeline/dashboard.js`
  (SSE /logs/stream/:file ~L9441, /api/action ~L9532).

  Reemplaza el grid plano de cards de procesos (ver actual-ops.png) por una
  TOPOLOGIA JERARQUICA navegable:

      pulpo (orquestador)
        |
        +.. listener-tg   svc-drive   svc-github   svc-emulador   (capa servicios)
        |
        +.. dashboard / reconciler (output)

  Idea central de los 4 CAs del issue:
    CA-1  Cada nodo muestra salud + "desde cuando" (uptime) y, al caer, el
          ULTIMO ERROR COMPLETO + historial de transiciones vivo<->muerto con causa.
    CA-2  Panel de LOG EN VIVO (SSE) de solo lectura con follow automatico,
          lazy-open SOLO del nodo seleccionado (evita agotar las ~6 conexiones
          HTTP/1.1 del browser — recomendacion guru).
    CA-3  Boton "Restart" por servicio: confirma (confirm-modal.js de EP8-H0) +
          audita (quien/cuando/source) reutilizando stop+start del componente,
          SIN gatillar el killAll/smoke/rollback global de restart.js.
    CA-4  Reconciler con breakdown por motivo + serie temporal (sparkline 7d).

  Convenciones del sistema (design-tokens.css - EP8-H0 #3953). Colores var()
  inlineados por ser SVG standalone; mapean 1:1 a los tokens:
    surface-0 #0D1117 - surface-1 #161B22 - surface-2 #1C2128 - surface-3 #252B33
    border #30363D - border-subtle #21262D - border-strong #484F58
    text-primary #E6EDF3 - text-secondary #B1BAC4 - text-dim #8B949E
    success #3FB950 - warning #D29922 - danger #F85149 - info #58A6FF
    retry #F59E0B - purple #BC8CFF - teal #2DD4BF - brand-cyan #00D6FF
    brand-blue #1890FF
  Iconografia: del sprite.svg real via #ic-* (aca redibujada como symbols m-*).
    Nuevos de este issue: ic-restart, ic-health-dead, ic-live-tail,
    ic-transition-history.
  Regla inquebrantable: TODA info de estado va con icono + texto/forma, nunca
  solo color (WCAG AA, dual-encoding). El nodo caido lleva borde rojo + punto
  rojo + cruz (ic-health-dead) + label "caido hace 41 m".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900"
     font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D6FF"/>
      <stop offset="1" stop-color="#1890FF"/>
    </linearGradient>
    <linearGradient id="barDup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1890FF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>

    <!-- iconos locales (espejo del sprite real) -->
    <symbol id="m-restart" viewBox="0 0 24 24">
      <path d="M5.5 12 A6.5 6.5 0 1 1 8 17.2" fill="none" stroke="currentColor"
            stroke-width="1.85" stroke-linecap="round"/>
      <path d="M5.2 7.5 L5.6 12.2 L10.2 11.4" fill="none" stroke="currentColor"
            stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="m-dead" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M9 9 L15 15 M15 9 L9 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="m-live" viewBox="0 0 24 24">
      <circle cx="6.5" cy="17.5" r="1.9" fill="currentColor"/>
      <path d="M6 11.5 A6 6 0 0 1 12.5 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M6 6.5 A11 11 0 0 1 17.5 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity="0.6"/>
    </symbol>
    <symbol id="m-hist" viewBox="0 0 24 24">
      <path d="M3.8 12 A8.2 8.2 0 1 0 6.2 6.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M3.4 7 L3.9 11.6 L8.4 10.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 8.5 V12.3 L14.8 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="m-hourglass" viewBox="0 0 24 24">
      <path d="M6.5 4 H17.5 M6.5 20 H17.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      <path d="M7.5 4 C7.5 8.5 16.5 8.5 16.5 4" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linejoin="round"/>
      <path d="M7.5 20 C7.5 15.5 16.5 15.5 16.5 20" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linejoin="round"/>
      <path d="M10.6 17.8 C10.6 15.4 13.4 15.4 13.4 17.8 Z" fill="currentColor"/>
    </symbol>
    <symbol id="m-radar" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M12 12 L18 7.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
    </symbol>
    <symbol id="m-check" viewBox="0 0 24 24">
      <path d="M5 12.5 L10 17.5 L19 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- fondo -->
  <rect width="1440" height="900" fill="#0D1117"/>

  <!-- ===================================================================== -->
  <!-- HEADER de identidad global (patron EP8-H0 / mockup 18 redesign)        -->
  <!-- ===================================================================== -->
