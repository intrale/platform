      <text x="22" y="0" font-size="12" font-weight="700" letter-spacing="1">TOPOLOGÍA</text>
    </g>

    <!-- conectores jerarquicos pulpo -> servicios -->
    <g stroke="#30363D" stroke-width="1.5" fill="none">
      <path d="M415 199 V214"/>
      <path d="M205 214 H625"/>
      <path d="M205 214 V228 M345 214 V228 M485 214 V228 M625 214 V228"/>
