      <use href="#m-dead" x="338" y="240" width="13" height="13" color="#F85149"/>
      <text x="345" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#E6EDF3">svc-drive</text>
      <text x="345" y="285" text-anchor="middle" font-size="10" fill="#F85149">caído hace 41 m</text>
    </g>
    <!-- svc-github (ok) -->
    <g>
      <rect x="425" y="228" width="120" height="64" rx="10" fill="#1C2128" stroke="#30363D"/>
      <circle cx="485" cy="246" r="5" fill="#3FB950"/>
      <text x="485" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#E6EDF3">svc-github</text>
      <text x="485" y="285" text-anchor="middle" font-size="10" fill="#8B949E">PID 11820 · 2 d</text>
    </g>
    <!-- svc-emulador (ok) -->
    <g>
      <rect x="565" y="228" width="120" height="64" rx="10" fill="#1C2128" stroke="#30363D"/>
      <circle cx="625" cy="246" r="5" fill="#3FB950"/>
      <text x="625" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#E6EDF3">svc-emulador</text>
