      <text x="1078" y="37" text-anchor="end" fill="#B1BAC4">Equipo</text>
      <text x="1152" y="37" text-anchor="end" fill="#B1BAC4">Pipeline</text>
      <text x="1238" y="37" text-anchor="end" fill="#B1BAC4">Bloqueados</text>
      <text x="1296" y="37" text-anchor="end" fill="#B1BAC4">Issues</text>
      <!-- Ops activo -->
