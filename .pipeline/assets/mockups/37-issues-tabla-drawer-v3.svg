<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mockup 37 — EP8-H5: Issues -> tabla configurable + panel lateral con timeline
  ============================================================================
  Spec de diseno vinculante para la historia #3958 (EP-8, epica #3952).
  Render previsto: dashboard V3 del operador (.pipeline/dashboard.js, puerto
  3200, dark-first). Skill implementador: pipeline-dev.

  Todos los colores provienen de .pipeline/assets/design-tokens.css — CERO
  HEX nuevo. Los HEX literales de este SVG son SOLO espejo de los tokens para
  el render estatico del mockup; en dashboard.js se usa var(--token).
  Iconos: <use href="#ic-..."> del sprite .pipeline/assets/icons/sprite.svg.

  Layout de la vista (extiende #issue-tracker, NO lo reemplaza):
    1. matrix-header   -> titulo + toggle board|tabla + selector columnas +
                          boton Export CSV + barra de filtros (persistida en URL)
    2. it-table        -> vista tabla densa, columnas configurables, filas <tr>
    3. it-drawer       -> <aside> lateral (NO modal), lista visible detras,
                          con timeline de fases proporcional al tiempo

  Decisiones de diseno cerradas (alineadas con CA del PO + SEC-1..SEC-4):
    - Toggle board<->tabla junto a it-zoom; estado en __it_state (sobrevive
      el DOM morphing de softRefresh cada 10s).
    - Riesgo explicable: badge icono+texto (ic-ok/warn/bad) con razon textual
      en tooltip y en el drawer. Nunca color solo (WCAG AA).
    - Drawer lateral lado a lado, NO overlay opaco: la tabla queda usable.
    - Timeline de fases: ancho de cada segmento proporcional a durationMs.
    - Filtros en query params + history.pushState; allowlist al hidratar.

  WCAG AA: ratios de texto >= 4.5:1; estado nunca solo por color
  (icono + texto + peso/borde).
-->
