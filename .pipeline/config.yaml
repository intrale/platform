# Pipeline V2 — Configuración del Pulpo
# Fuente de verdad para pipelines, fases, concurrencia e intake.

pipelines:
  definicion:
    fases: [analisis, criterios, sizing]
    fase_rechazo: null  # No hay rechazo en definición (se escala al usuario)
    skills_por_fase:
      analisis: [guru, security]
      criterios: [po, ux, architect]  # #3613 — architect entra en `criterios` con espera blanda (docs/pipeline/architect-role.md §2)
      sizing: [planner]

  desarrollo:
    fases: [validacion, dev, build, verificacion, linteo, aprobacion, entrega]
    fase_rechazo: dev   # Los rechazos siempre vuelven a dev
    skills_por_fase:
      validacion: [po, ux, guru]
      dev: [backend-dev, android-dev, web-dev, pipeline-dev]  # Uno solo por historia, según labels
      build: [build]                             # Agente Claude (haiku) — gradlew check
      verificacion: [tester, security, qa]
      linteo: [linter]                           # Determinístico (Node, #2491) — chequeos mecánicos antes del LLM
      aprobacion: [review, po, ux, architect]   # #3613 — architect Fase 2: verifica adherencia diff vs receta firmada (architect-role.md §9)
      entrega: [delivery]

# Concurrencia máxima por rol (instancias simultáneas de Claude)
concurrencia:
  # Definición — no modifican código
  po: 2
  ux: 2
  guru: 2
  security: 2
  architect: 2           # #3613 — mismo nivel que po/ux/guru; corre en `criterios` y `aprobacion`
  planner: 1             # Necesita ver panorama completo

  # Desarrollo — worktree por issue
  backend-dev: 3
  android-dev: 2
  web-dev: 2
  pipeline-dev: 2        # Scripts Node.js del pipeline (.pipeline/*.js)

  # Verificación
  tester: 2
  qa: 1                  # Limitado por hardware (emulador + video)
  linter: 3              # Determinístico, Node puro — cero tokens, puede correr en paralelo
  review: 2

  # Entrega — secuencial
  build: 1               # Gradle consume mucha CPU/RAM
  delivery: 1            # Merge a main debe ser secuencial

  # Commander — singleton
  commander: 1

# Priorización de fases: el Pulpo procesa fases en orden inverso (post-dev primero)
# Esto garantiza que build/qa/review/delivery tengan slots antes que dev,
# evitando que el backlog de desarrollo bloquee el avance de issues ya codificados.
# Orden efectivo: entrega → aprobacion → linteo → verificacion → build → dev → validacion

# Routing mismatch: cuántas veces puede un issue volver a definición por
# "fuera de alcance" antes de escalar a humano. Evita bucles en casos raros
# donde ningún agente encuentra su alcance. Al superar el budget se aplica
# label `blocked:routing-manual` y se notifica por Telegram.
routing:
  max_bounces: 2

# Intake: qué labels de GitHub disparan la entrada a cada pipeline
intake:
  definicion:
    label: "needs-definition"
    fase_entrada: analisis
  desarrollo:
    label: "Ready"
    fase_entrada: validacion

# #3175 — Admission gate: garantiza que todo issue/PR creado tenga un label
# de admisión (`needs-definition` o `Ready`). Defensa en dos capas:
#
#   1. GitHub Action (`.github/workflows/admission-gate.yml`) — event-driven,
#      aplica el label dentro de ~30s del open. Configurable con la variable
#      de repo `ADMISSION_GATE_DRY_RUN=1` para correr sin aplicar.
#
#   2. Sweep periódico en `servicio-reconciler.js` — defensa en profundidad
#      para issues/PRs que escaparon al workflow (downtime de Actions,
#      huérfanos pre-deploy, forks con permisos limitados). Corre en cada
#      ciclo de reconcile (5min default) junto con el sweep de needs-human.
#
# La configuración real de runtime se hace por env vars que setea el pulpo
# al lanzar servicio-reconciler:
#   - ADMISSION_SWEEP_ENABLED=0  → desactiva el sweep del reconciler.
#                                   El workflow event-driven sigue funcionando.
#   - ADMISSION_GATE_DRY_RUN=1   → reconciler y workflow loguean decisiones
#                                   pero NO aplican labels ni encolan alertas.
#
# Este bloque YAML es declarativo (visibilidad operacional). Los valores
# acá NO se leen al iniciar el reconciler — son referencia y futura
# extensión si decidimos hidratar via env desde config.yaml.
admission_gate:
  # Sweep del reconciler activo por default. Para apagar: setear
  # ADMISSION_SWEEP_ENABLED=0 en el entorno del proceso.
  sweep_enabled: true
  # Modo dry-run global (loguea pero no aplica). Setear ADMISSION_GATE_DRY_RUN=1
  # en el entorno para activar runtime.
  dry_run: false
  # Cap de huérfanos a aplicar por sweep. Si N>10, los primeros 10 se etiquetan
  # y se manda alerta especial 🔴 al Commander pidiendo revisión humana antes
  # de continuar. Valor sincronizado con lib/admission-gate.js → BOOTSTRAP_CAP.
  bootstrap_cap: 10

# Mapeo de labels de GitHub a skill de desarrollo
dev_skill_mapping:
  "area:pipeline": "pipeline-dev" # Scripts Node.js del pipeline (.pipeline/*.js, roles, hooks)
  "area:dashboard": "pipeline-dev" # Ventanas del dashboard V3 (Node.js, .pipeline/dashboard.js + views/)
  "area:infra": "backend-dev"    # Infra kotlin/gradle/ci-cd (NO pipeline — eso es area:pipeline)
  "area:backend": "backend-dev"
  "app:client": "android-dev"
  "app:business": "android-dev"
  "app:delivery": "android-dev"
  "area:web": "web-dev"
  default: "backend-dev"         # Si no tiene label de área (priority:critical se rutea por área)

# Prioridad de ruteo cuando un issue tiene MÚLTIPLES labels de dominio (ej. area:infra + app:client).
# Orden de mayor a menor prioridad. El primer label presente en el issue define la ruta.
# Rationale: si alguien tagueó `area:pipeline` o `area:infra`, esa intención manda — issues del pipeline
# no deben caer en android-dev sólo porque tienen `app:client` por error (ej. #2328).
dev_routing_priority:
  - "area:pipeline"
  - "area:dashboard"
  - "area:infra"
  - "area:backend"
  - "area:web"
  - "app:client"
  - "app:business"
  - "app:delivery"

# Heurística de override por contenido: issues etiquetados `area:infra` pero con
# referencias fuertes al pipeline Node.js se re-rutean a `pipeline-dev`. Evita que
# cambios del pulpo/dashboard caigan en backend-dev (stack Kotlin, no valida JS).
pipeline_scope_keywords:
  - ".pipeline/"
  - "pulpo.js"
  - "dashboard"
  - "restart.js"
  - "rollback.sh"
  - "smoke-test"
  - "rejection-report"
  - "listener-telegram"
  - "servicio-telegram"
  - "servicio-github"
  - "servicio-emulador"
  - "servicio-drive"
  - ".pipeline/roles/"

# Prioridad de intake (orden de procesamiento)
prioridad_labels:
  - "priority:critical"
  - "priority:high"
  - "priority:medium"    # Default si no tiene label
  - "priority:low"

# Priorización por features — el pipeline ordena issues por feature priority
# Issues con feature de mayor prioridad se procesan primero dentro de cada nivel de priority
feature_priority:
  # MVP Core — estas features tienen máxima prioridad de entrega
  critical:
    - "feature:usuarios-auth"
    - "feature:catalogo-productos"
    - "feature:checkout-pagos"
    - "feature:delivery"
  # Post-MVP
  high:
    - "feature:configuracion-negocio"
    - "feature:comunicacion"
  medium:
    - "feature:stock-inventario"
    - "feature:dashboard-analitica"
  low:
    - "feature:marketing-engagement"
    - "feature:ia"

# Límites de recursos del sistema — presión graduada en vez de binario
resource_limits:
  # Umbrales graduados (verde → amarillo → naranja → rojo)
  green_max_percent: 50            # Debajo de esto: capacidad total, sin restricciones
  yellow_max_percent: 65           # Moderado: concurrencia reducida al 50%, limpieza suave
  orange_max_percent: 80           # Alto: solo 1 agente total, limpieza agresiva
  red_max_percent: 90              # Crítico: bloquear todo, kill de emergencia

  qa_env_max_cpu_percent: 60       # QA env (3 servicios pesados) necesita más margen
  qa_env_max_mem_percent: 60       # QA env: DynamoDB + Gradle + emulador consumen mucha RAM
  max_concurrent_devs: 1           # Máximo de desarrolladores simultáneos

  # #4051 — Ventana nocturna: umbrales relajados + piso de concurrencia garantizado.
  # Durante la ventana de inactividad de Anthropic (22:00–07:00) el trabajo cae a
  # la cadena de respaldo (Codex / free tiers). La RAM baseline nocturna (70-77%)
  # clavaba el gate en ORANGE → techo de 1 agente → ~0,67 agentes promedio. Acá
  # relajamos los umbrales y garantizamos un piso para que el pipeline avance.
  # Mecanismo INDEPENDIENTE de rest_mode (que corre 24/7 con schedule vacío).
  # red_max_percent se mantiene como tope duro (RED sigue bloqueando todo) para
  # evitar swap/OOM. enabled:false desactiva el modo nocturno por completo.
  night_window:
    enabled: true
    start: "22:00"
    end: "07:00"
    timezone: "America/Argentina/Buenos_Aires"
    green_max_percent: 55          # Mismo criterio diurno, leve holgura
    yellow_max_percent: 78         # RAM 70-77% pasa a YELLOW (no ORANGE)
    orange_max_percent: 88         # Naranja recién sobre 88%
    red_max_percent: 93            # Tope duro: RED sigue bloqueando todo
    min_concurrency_floor: 2       # Piso de agentes simultáneos aunque haya naranja
    max_concurrent_devs: 2         # Piso de devs nocturno (override del 1 diurno)

  # Limpieza proactiva
  proactive_cleanup_cycles: 10     # Cada N ciclos del Pulpo, limpiar aunque no haya presión
  kotlin_daemon_kill: true         # Matar también Kotlin compile daemons huérfanos

  # Priority Windows — ventanas autoexcluyentes QA y Build
  # Cuando la cola de QA o Build supera el umbral, se activa la ventana correspondiente.
  # QA > Build > Dev (la etapa más avanzada siempre tiene prioridad).
  # Solo una ventana puede estar activa a la vez (autoexcluyentes).
  # Sin timeout fijo: la ventana corre hasta vaciar su cola o desactivación manual.
  priority_windows_activation_threshold: 3   # Issues acumulados para activar ventana (QA o Build)
  priority_windows_safety_timeout_hours: 2   # Horas sin completar ningún issue → notifica Telegram (NO cierra)
  # #2651 — cierre por no-progreso + cooldown para evitar loop abrir/cerrar
  qa_priority_no_progress_minutes: 3         # Ventana QA con 0 agentes corriendo durante N min → cierre por inactividad
  qa_priority_cooldown_minutes: 15           # Tras cerrar por no-progreso, no reabrir durante N min aunque la cola siga ≥ umbral

  # Diagnóstico
  log_top_consumers: true          # Logear top 5 procesos por RAM antes de actuar
  diagnostic_on_orange: true       # Diagnóstico completo al entrar en naranja/rojo

# Timeouts
timeouts:
  poll_interval_seconds: 30       # Frecuencia de barrido/lanzamiento (local)
  intake_interval_seconds: 300    # Frecuencia de intake (GitHub API, 5 min)
  orphan_timeout_minutes: 10      # Archivo en trabajando/ sin proceso → vuelve a pendiente

  # Timeout efectivo por agente (watchdog en pulpo.js mata al hijo si lo excede)
  # Si un skill no está en el override, se usa agent_timeout_default_minutes.
  agent_timeout_default_minutes: 30
  agent_timeout_overrides:
    backend-dev: 60               # Dev mínimo 60min: historias grandes necesitan tiempo
    android-dev: 60               # Dev mínimo 60min: historias grandes necesitan tiempo
    web-dev: 60                   # Dev mínimo 60min: historias grandes necesitan tiempo
    pipeline-dev: 60              # Dev mínimo 60min: historias grandes necesitan tiempo
    build: 60                     # Gradle check + assemble puede tardar mucho en primer build
    qa: 45                        # QA E2E con emulador + video
    tester: 45                    # Cobertura Kover + suite completa
    linter: 5                     # Determinístico — sólo lee diff/git log, debería durar segundos
    delivery: 90                  # Espera CI completo (OWASP ~28min, check-app ~15min) + gate de review + merge + reporte

# Build (#2405 CA-1) — Allowlist de JAVA_HOME para el rol build
# Se compara normalizando separadores (C:/Users/... y C:\Users\...), case-insensitive.
# Paths con `..` o whitespace embebido son rechazados.
# Agregar un JDK nuevo: appendear una entrada y commitear.
# Ver docs/operacion-pipeline.md para el flujo completo.
build:
  java_home_allowlist:
    - "C:/Users/Administrator/.jdks/temurin-21.0.7"
    - "C:/Users/Administrator/.jdks/temurin-21.0.8"

# Circuit breaker de infra (#2405 CA-4)
# Cuando un issue acumula N rebotes infra consecutivos sin recuperación, el Pulpo
# aplica label `needs-human`, comenta en GitHub con estructura UX, y lo saca de la
# cola de intake hasta que un humano quite el label. Arranca en 5 (conservador) y
# se puede bajar a 3 tras una semana de observación. Distinto de MAX_REBOTES_INFRA
# (cap duro antisabotaje, default 20) — este es el threshold "escalar a humano".
circuit_breaker:
  infra_escalate_threshold: 5
  # #3940 — auto-resume del CB de infra. Tras N prechecks OK consecutivos reales
  # (no hits del cache de 30s), el Pulpo cierra el CB solo y notifica por Telegram.
  # El cierre manual (node .pipeline/resume.js) sigue disponible como override.
  # SEC-R1: debe ser entero ≥ 1; un valor inválido (0, negativo, no numérico)
  # cae al default 3 con warning — nunca deshabilita el fail-closed de #2305.
  auto_resume_ok_threshold: 3
  # #4160 — auto-promoción por convergencia. Cuando un issue rebota de
  # `verificacion` a `dev` sin una observación accionable real y el dev produce
  # el MISMO diff que en el rebote anterior (convergencia) con el build verde, el
  # Pulpo auto-promueve en lugar de seguir rebotando hasta agotar el breaker.
  auto_promote_on_convergence: true
  # Condición necesaria: el build del issue debe estar verde para auto-promover.
  convergence_requires_build_green: true
  # Gate RIESGO-1 (NO NEGOCIABLE): rechazos originados por estos skills NUNCA se
  # auto-promueven por convergencia — siguen el circuit breaker hacia humano.
  # `security` queda además excluido por código (defensa-en-profundidad).
  convergence_excludes_skills: [security]

# GitHub
github:
  owner: "intrale"
  repo: "platform"
  project_number: 2               # GitHub Project V2

# Pre-check de conectividad (#2317) — evita lanzar agentes cuando la red está caída
precheck:
  timeout_ms: 5000                # Timeout por endpoint (DNS y TLS)
  max_retries: 3                  # Reintentos por endpoint con backoff exponencial + jitter
  # endpoints: (opcional; si no se define se usan los de connectivity-precheck.js)
  # - { category: github,  host: api.github.com,                                 tlsPort: 443 }
  # - { category: aws,     host: s3.us-east-2.amazonaws.com,                     tlsPort: 443 }
  # - { category: backend, host: mgnr0htbvd.execute-api.us-east-2.amazonaws.com, tlsPort: 443 }

# Detector de anomalías de consumo (#2891 PR-B) — baseline horario + threshold.
# El detector lee `.pipeline/metrics/snapshot.json` y compara la hora actual
# contra la baseline (rolling window de los últimos `lookbackDays` días). Cada
# evaluación se persiste en `.pipeline/metrics-history.jsonl` con shape
# `{ type: 'anomaly', ts, hour, baseline_usd, actual_usd, ratio, alerted }`.
#
# Esta historia (PR-B) NO dispara canales de alerta — eso es PR-C. Acá solo
# se calibra la maquinaria de detección y se persiste el histórico.
#
# Rangos válidos: valores fuera de rango se reemplazan por defaults con
# warning en stderr. NUNCA detiene el pipeline por config rota.
anomaly_detector:
  intervalMin: 10            # Cadencia del cron interno (rango 1-240)
  pctThreshold: 0.5          # actual > baseline * (1 + 0.5) → +50% (rango 0.05-5.0)
  warmupDays: 7              # Grace period: sin baseline confiable durante N días
  lookbackDays: 7            # Días del rolling window para baseline (rango 7-14)
  minUsdToAlert: 0.5         # Piso absoluto: si actual ≤ $0.50/h, no alerta nunca
  minAbsUsdPerHour: 2.0      # Umbral grueso durante warmup (mientras no hay baseline)

# (#2892 PR-C) Alertas de consumo anómalo: canales y snooze.
# El pulpo enchufa el detector con dos canales: Telegram (mensaje sanitizado
# via lib/redact.js + lib/sanitize-payload.js) y banner persistente en el
# dashboard (con pill compacta en header + selector de snooze 1h/4h/24h).
#
# Reglas:
#   - max_snooze_hours: cap absoluto. La UI solo expone 1/4/24, pero el
#     backend valida explicitamente que cualquier payload > este valor sea
#     RECHAZADO (CA-Sec-A04b). NO clampea: devuelve error.
#   - consecutive_baseline_checks_to_clear: cantidad de chequeos consecutivos
#     en baseline (alerted=false) necesarios para auto-clear (CA-2.7).
#
# Estos parametros viven en el codigo (constants en lib/rest-mode-state.js)
# para evitar que un config malicioso suba el cap a 9999h. Se documentan
# aca para visibilidad pero NO son configurables sin tocar codigo.
cost_anomaly_alert:
  max_snooze_hours: 24                          # CAP HARDCODED, doc-only
  consecutive_baseline_checks_to_clear: 2       # CAP HARDCODED, doc-only
  channels:
    telegram: true            # Encolar en .pipeline/servicios/telegram/pendiente/
    dashboard_banner: true    # Renderizar banner + pill en /

# (#3943, EP6-H1) Cron de ghostbusters --worktrees: retira worktrees muertos.
# Criterio compuesto (RS-3): seguridad (sin uncommitted + sin unpushed + sin
# proceso vivo) AND abandono (rama inexistente en remoto O antigüedad > umbral).
# Guard anti-suicidio (RS-1) y git sin shell (RS-2) en lib/ghostbusters-worktrees.js.
# Audit JSONL append-only en .pipeline/audit/ghostbusters-worktrees.jsonl (RS-4).
#
# ⚠️ dry_run: true es el default OBLIGATORIO de la primera ejecución (RS-4).
# Habilitar borrado real (dry_run: false) SOLO después de revisar el output
# del dry-run en .pipeline/logs/ghostbusters-cron.log.
ghostbusters_cron:
  enabled: true
  intervalMin: 60            # Cadencia del cron interno (clamp 5-1440)
  cap: 5                     # Máximo de worktrees borrados por corrida (RS-4)
  dry_run: true              # Default seguro: reportar sin borrar
  age_threshold_days: 30     # Umbral de antigüedad para criterio de abandono

# Modo descanso (#2890 PR-A, parte del épico #2882) — gating horario.
# Durante la ventana configurada, sólo corren los skills determinísticos
# (delivery, builder, linter, tester). El resto queda en `pendiente/` sin
# penalización (no consume rebote).
#
# La configuración funcional (active, start, end, timezone, days, manual)
# vive en `.pipeline/rest-mode.json` y se edita desde el dashboard. Acá sólo
# vive lo que tiene impacto de seguridad y NO debe ser editable desde la UI.
#
# Reglas:
#   - bypass_labels: si el issue tiene cualquiera de estos labels, el gate
#     se ignora y el agente arranca aun dentro de la ventana. La UI NO
#     edita esta lista (CA-Sec-A04a) — un attacker con acceso al dashboard
#     no debería poder bajar el guardrail. Tocar este YAML requiere CODEOWNERS.
#   - max_window_changes_per_hour: rate limit suave del endpoint POST. Por
#     encima de este número se devuelve 429 (anti-spam, no anti-abuso).
rest_mode:
  bypass_labels:
    - "priority:critical"
  max_window_changes_per_hour: 30

# Staleness (#2404) — evita rebotar a dev con `motivo_rechazo` que referencia un
# build-log obsoleto. Si el log tiene mtime > umbral, NO se rebota al developer:
# se resetea el contador del circuit breaker y se re-encola a `build` para que
# el builder vuelva a correr con el entorno actualizado.
# Override por env: PIPELINE_STALENESS_HOURS (horas, decimal OK).
# Clamp mínimo hardcoded de 5 minutos (300s) — valores menores se elevan a este
# mínimo con warning en log. Protege contra bypass del circuit breaker
# por config maliciosa/errónea (ej. staleness: 0).
staleness:
  build_log_max_age_hours: 24     # Default — logs de build más viejos se consideran stale
  max_resets_per_issue: 5         # Tope duro: más de 5 resets por stale-log → escalar, no resetear

# =============================================================================
# Watchdog resiliente (#4077) — auto-supervisión del watchdog
# =============================================================================
# El watchdog (.pipeline/watchdog.ps1) escribe un heartbeat propio en cada
# ciclo (.pipeline/logs/watchdog.heartbeat). Una 2da tarea de Task Scheduler
# (Intrale-Pipeline-V2-Watchdog-Supervisor → watchdog-supervisor.ps1) lee ese
# heartbeat y relanza el watchdog si está stale. La lógica de decisión vive en
# .pipeline/lib/watchdog-supervisor.js (testeada con node --test).
# Override por env: WATCHDOG_STALE_MINUTES (entero positivo; inválido → default,
# NUNCA "nunca stale" — SEC-2).
watchdog:
  stale_minutes: 6                 # heartbeat más viejo que esto = watchdog stale (3 ciclos de 2 min)
  supervisor_max_restarts: 3       # SEC-4: cap duro de relanzamientos por ventana antes de escalar a needs-human
  supervisor_cooldown_seconds: 90  # mín. entre relanzamientos (reusa semántica del cooldown de last-restart.json)
  supervisor_window_minutes: 60    # ventana para contar relanzamientos contra el cap
  # #4154 — Liveness real del Pulpo. El Pulpo emite un heartbeat por iteración
  # (.pipeline/last-tick.json); el watchdog lo lee y, si su edad supera este
  # umbral con el proceso vivo, lo declara zombi (loop colgado) y lo reinicia.
  # DESACOPLADO del display: /salud usa "esperado < 30s" sólo para MOSTRAR salud;
  # 30s == 1 poll_interval del Pulpo, un ciclo lento lo rozaría sin ser zombi.
  # 90s = max(90, 3×poll_interval) evita falsos positivos (CA-4) y restart-storms
  # (SEC-3). Override por env PULPO_LIVENESS_KILL_SECONDS (entero positivo;
  # inválido → default, NUNCA "nunca stale" — SEC-2).
  pulpo_liveness_kill_seconds: 180

# Dashboard — opciones del dashboard del pipeline
dashboard:
  # #2895 — Threshold (% del promedio histórico) a partir del cual un agente
  # working se considera "estancado" y la card resalta el ETA con badge ⚠.
  # Default 150 evita falsos positivos por varianza natural; subir a 200 si
  # los promedios todavía son ruidosos por pocas muestras.
  eta_stuck_threshold_pct: 150

  # #3961 EP8-H8 — Umbrales configurables de los KPIs del panel de métricas.
  # Migrados desde los hardcodeados (SHERLOCK_PRECISION_TARGET / _SAME_PROVIDER
  # de dashboard-slices.js y los targets DORA de dashboard.js). El loader
  # (lib/dashboard-thresholds.js) valida tipo/rango con default seguro y clamp;
  # un valor ausente/invalido cae al default y un valor fuera de rango se acota.
  # Cuando un KPI excede su umbral, la card se pinta y se genera una entrada en
  # la bandeja de alertas (a traves de alertTraySlice()).
  thresholds:
    sherlock_precision_target: 0.90        # [0..1] verde >= target
    sherlock_precision_alert_below: 0.80   # [0..1] alerta visible < este valor
    sherlock_same_provider_target: 0.10    # [0..1] meta < 10% (independencia del juez)
    voice_p95_max_ms: 8000                 # [0..600000] banda saludable de p95 latencia de voz
    deliverables_min_pct: 80               # [0..100] % minimo de fases con entregable por skill
    dora_lead_time_max_h: 6                # [0..720] target lead time < 6h
    dora_throughput_min_per_day: 2         # [0..1000] target throughput > 2/dia
    dora_fail_rate_max_pct: 15             # [0..100] target change fail rate < 15%

# =============================================================================
# Detector de cuota Anthropic agotada (#2974, hija de #2955)
# =============================================================================
# Cuando el CLI claude-code reporta cuota agotada, el pulpo persiste un flag
# en `.pipeline/quota-exhausted.json` y gatea futuros spawns LLM. Skills
# determinísticos (builder/tester/linter/delivery) siguen corriendo.
#
# CA-1 (anti prompt-injection): la detección SOLO matchea por shape estructurado
# del JSON stream del CLI (`type:'result' && is_error:true && error_type ∈ allowlist`).
# NUNCA matchea por substring sobre texto libre.
#
# Kill-switch operacional: `rm .pipeline/quota-exhausted.json` desbloquea.
quota_detector:
  # @deprecated #3077 (H5 multi-provider): la fuente de verdad pasó a
  # `.pipeline/agent-models.json` → `providers.<id>.quota_error_types`.
  # Esta clave queda como fallback para callers legacy de
  # `quotaExhausted.detectFromResultEvent(evt, cfg)` que no resuelven
  # providerDef desde agent-models. Se eliminará en una historia siguiente
  # cuando todos los callers migren a `detectQuotaError(evt, providerDef)`.
  # Documentado en docs/pipeline-multi-provider.md §3 (contrato quota_error_types).
  #
  # Allowlist estricta de error_type que activan el flag (CA-1, CA-8 PO).
  # `rate_limit_error` (429 transitorio) NO va acá — se maneja con backoff/retry.
  error_types:
    - usage_limit_error
    - weekly_quota_exhausted
  # @deprecated #3077: cap por provider en agent-models.json
  # (`providers.<id>.resets_at_cap_max_days`). Mantenemos este valor como
  # fallback para callers legacy. 7 días cubre el ciclo semanal del Plan Max
  # Anthropic. OpenAI suele usar cuotas mensuales (31 días) — declarado en
  # agent-models.json:providers.openai-codex.resets_at_cap_max_days.
  resets_at_cap_max_days: 7
  # Si `false`, el detector funciona pero no escribe `.pipeline/logs/quota-detector-*.log`.
  # Útil para apagar audit en caso de problema de espacio en disco — no debería
  # ser necesario nunca con la rotación normal.
  audit_log_enabled: true
  # (#2975) Cadencia de recordatorios del notifier mientras el flag está activo.
  # Default 120 min = 2h. Mínimo efectivo 1 min (clamp en código). Valores <= 0
  # caen al default. Subir mucho aleja al usuario del estado real; bajarlo
  # demasiado spamea (memoria `feedback_telegram-messages-natural`). El rango
  # razonable está documentado en #2979 — validación pendiente como hardening.
  reminder_interval_minutes: 120

# =============================================================================
# Alerta y switch preventivo por cuota de proveedor (#4282)
# =============================================================================
# Anticipa la caída de un proveedor: avisa (Telegram + banner del dashboard) y
# —si el switch preventivo está activo— degrada el primary a fallback ANTES de
# quedarse sin cuota, en vez de descubrirlo al reventar (incidente 27-28/06).
#
# Fuente de dato: `dashboard-slices.quotaSlice` (consumo, NO re-extracción).
# El guard (`lib/provider-quota-guard.js`) SOLO actúa con `confidence === fresh`
# (REQ-SEC-4). Cobertura real por proveedor:
#   - anthropic: session + weekly (el switch preventivo aplica a weekly — caso
#     del incidente).
#   - openai-codex: sin ventana de sesión (session siempre "sin dato"); weekly
#     según presupuesto mensual cuando hay dato fresco.
#   - gemini-google y free-tier: buckets "missing" → no se alertan (sin ruido).
#
# Validación fail-safe (REQ-SEC-2): cada par debe cumplir `0 < warn < crit <= 100`
# numérico; ante valor inválido se cae a `defaults` y se loggea, sin romper el
# ticker. `preventive_switch.enabled` solo activa el switch con `true` literal.
multi_provider:
  quota_alert:
    # Umbrales por defecto si un proveedor no declara los suyos.
    defaults:
      warn: 80    # % que dispara aviso temprano
      crit: 95    # % que dispara aviso crítico (+ degradación si el switch está ON)
    # Umbrales por proveedor (anticipan el incidente de Anthropic semanal).
    anthropic:
      warn: 80
      crit: 95
    openai-codex:
      warn: 80
      crit: 95
    gemini-google:
      warn: 80
      crit: 95
    # Switch preventivo: degrada primary→fallback de forma controlada al cruzar
    # `crit` con dato fresco. DEFAULT OFF (solo alerta). El soft-gate NUNCA fuerza
    # el hard gate ni vacía la chain de fallbacks (REQ-SEC-3, ver dispatch-with-fallback).
    preventive_switch:
      enabled: false
      # Vigencia del marker de degradación (respaldo anti-zombie). Default 90 min.
      marker_ttl_minutes: 90

# =============================================================================
# Presupuesto de ritmo (pacing budget) por proveedor (#4289)
# =============================================================================
# Reparte proporcionalmente la cuota SEMANAL de cada proveedor para no agotar
# todo el cupo en pocos días. Token bucket semanal: cada hora se acredita la
# porción proporcional del cupo (quota / 168h) y se descuenta el consumo real.
#
#   🟢 verde    — en ritmo: operación normal.
#   🟡 amarillo — adelantado (con saldo): de-prioriza en el reparto (prefiere
#                 fallback) SIN apagar. Aviso Telegram.
#   🔴 rojo     — saldo acumulado agotado: desactiva temporalmente vía
#                 provider-disabled (source:'pacing', TTL) y deriva al fallback.
#                 Vuelve solo al recargarse el bucket.
#
# Invariantes: FAIL-OPEN (estado corrupto ⇒ no de-prioriza ni apaga), GRANULAR
# (solo afecta al proveedor excedido), y NO override de la matriz de permisos
# (si pacing dejaría sin candidato, cede ante la matriz — ver dispatch-with-
# fallback CA-6). La ventana semanal se ancla al reset de weekly-quota.js
# (domingo 21:00 ART, configurable por QUOTA_TZ_OFFSET_MIN).
#
# Rollout con kill-switch: `enabled: false` por default. Activar tras validar
# tests + smoke. Overrides por env: PACING_YELLOW_MARGIN_PCT, PACING_TTL_RED_MIN.
pacing:
  enabled: false
  # Cupo semanal por proveedor, en puntos porcentuales (100% = cupo completo).
  weekly_quota_pct_per_provider: 100
  # Adelanto (en puntos %) sobre el ritmo lineal que dispara 🟡 amarillo.
  yellow_margin_pct: 5
  # Vigencia del disable por 🔴 rojo (respaldo + recuperación automática). Min.
  ttl_red_min: 60

# =============================================================================
# Handoff cross-agente (#2993)
# =============================================================================
# Cuando un issue pasa por varias fases (analisis → criterios → validacion →
# dev → build → verificacion → aprobacion → entrega), cada agente vuelve a
# cargar el contexto completo del issue (CLAUDE.md, MEMORY, body+comments).
# El handoff es un artefacto markdown liviano por issue donde cada agente
# deja una sección descriptiva al cerrar fase, y el próximo lo recibe ya
# inyectado en su userPrompt.
#
# Reglas de seguridad fundamentales (lib/handoff.js):
#   - Sanitización contra prompt-injection (CA-B1, BLOCKER): denylist
#     hardcoded en código. NO configurable desde acá.
#   - Filtrado de secrets/PII (CA-B3): reusa lib/redact.js + patrones extra.
#     NO configurable desde acá.
#   - Validación de issue_id (CA-B4): /^\d+$/. NO configurable.
#   - Atomic write + lock por issue (CA-B5).
#   - Audit log a `.pipeline/logs/handoff-audit.jsonl` (CA-B7) sin contenido.
#
# Lo que SÍ es configurable acá:
#   - enabled:          flag global de rollout. Default OFF (false). Activar
#                       solo después de validar telemetría y ausencia de
#                       falsos positivos en el detector de prompt-injection.
#   - kill_switch:      si está en true, override de enabled (apagado total).
#                       Permite cortar inmediato sin rebootear el pulpo.
#   - max_section_kb:   tope por skill. Sobre eso, se trunca con marcador.
#                       Default 10. Mitiga DoS por handoff inflado (CA-B6)
#                       y crecimiento sin tope (RT-1 del análisis de guru).
#   - retention_days:   ventana de validez por sección. Las secciones más
#                       viejas se ignoran al leer (CA-A5). Default 30.
#   - inject_in_phases: lista explícita de fases que reciben inyección.
#                       Permite arrancar con un subset (ej. solo verificacion
#                       y aprobacion) y ampliar después de validar.
#
# Rollout sugerido (operacional):
#   1. Mergear con `enabled: false`. Validar tests unitarios + smoke test.
#   2. Activar en una fase aislada (`inject_in_phases: [verificacion]`) +
#      `enabled: true`. Observar `/api/handoff-metrics` y logs de auditoría
#      durante ≥3 días.
#   3. Ampliar progresivamente. Si aparece `injection_blocked` en audit,
#      `kill_switch: true` y revisar el origen.
handoff:
  enabled: false
  kill_switch: false
  max_section_kb: 10
  retention_days: 30
  inject_in_phases:
    - validacion
    - criterios
    - sizing
    - verificacion
    - aprobacion
    - entrega

# #4136 — Frontera activo/histórico.
#
# El Pulpo muda al `historico/` (raíz aparte, mismo volumen → rename atómico) los
# artefactos `procesado/` de issues en REPOSO TOTAL (sin archivos en
# pendiente/trabajando/listo de ninguna fase, y que alcanzaron su fase terminal o
# están `closed` en GitHub). Así el camino vivo se mantiene acotado solo y el
# snapshot del dashboard (`_genPipelineState`) deja de congelar el event loop.
# El histórico se consulta on-demand por id validado; NO lo walkea el snapshot.
#
#   - enabled:        habilita el barrido (rollout gradual; default true).
#   - max_per_tick:   tope de issues archivados por tick del Pulpo.
#   - retention_days: ventana de retención del histórico (limpieza futura).
historico:
  enabled: true
  max_per_tick: 200
  retention_days: 90

# #3416 — Rebobinado del pipeline tras rechazo del operador.
#
# El operador dispara `/rechazar <issue> <alias>` desde Telegram. El Commander
# (productor #3441, `lib/commander/rechazar-handler.js`) valida y escribe un
# archivo JSON en `.pipeline/rejections/<issue>-<unix-ts>.json`. El `brazoRewind`
# del pulpo (consumer #3416) lo consume vía adapter
# (`lib/rewind-event-adapter.js`), valida (whitelist alias, fase no-futura,
# punto de no retorno, deny-list de prompt injection), mata al agente activo
# si corresponde, mueve el archivo `.<skill>` a la fase destino y postea
# comentario en GitHub. Tras procesar mueve el evento a
# `.pipeline/rejections/listo/`.
#
# Mitigaciones de seguridad (#3416 SEC-1..SEC-8 del análisis de security):
#   - SEC-1 prompt injection: deny-list + cap 2KB + wrap XML `<rejection_feedback>`.
#   - SEC-2 autorización: source debe ser `telegram-commander` o `cli-local`.
#   - SEC-3 validación estricta de fase: whitelist enum cerrada.
#   - SEC-4 path traversal: `Number(issue)` strict guard.
#   - SEC-5 race con agente activo: SIGTERM → SIGKILL con grace period.
#   - SEC-6 inyección comentario GitHub: motivo dentro de fenced code block.
#   - SEC-7 audit log: hash chain SHA-256 reusando `lib/audit-log.js`.
#   - SEC-8 rate limit suave: alerta (no bloqueo) ≥10 rewinds/hora.
#
# Ver: docs/pipeline/rewind-operador.md
rewind:
  # Tiempo de gracia antes de escalar SIGTERM → SIGKILL al agente activo.
  # 30s es suficiente para que el agente termine un flush de logs pero corto
  # para no trabar al operador esperando un rewind.
  kill_grace_seconds: 30
  # Ventana del rate limit suave (CA-8). El umbral es `rate_limit_threshold`
  # rewinds por issue en esta ventana — al superar, alerta a Telegram, NO
  # bloquea. Respeta la decisión de Leo de no tener circuit breaker.
  rate_limit_window_minutes: 60
  rate_limit_threshold: 10
  # TTL de markers in-flight (CA-9 recovery). Si el pulpo crasha durante un
  # rewind, los markers > ttl se limpian al boot y el operador puede reintentar.
  in_flight_stale_minutes: 5

# #3085 / S7 multi-provider — aislamiento de credenciales por proceso.
#
# Cuando `env_isolation_enabled: true`, el pulpo filtra `process.env` antes de
# pasarlo al child del agente: solo viaja la API key del provider declarado
# por el skill (Anthropic xor OpenAI), las variables del sistema en allowlist
# (PATH, SystemRoot, ComSpec, etc.), todas las PIPELINE_*, y los scopes que el
# skill declara via `requires_credentials` (github / aws / gradle-android /
# telegram-hooks).
#
# Cuando `false` (default rollout), el pulpo conserva el comportamiento previo
# al issue #3085: hereda TODO el `process.env` al child. Esto preserva
# regresión cero corriendo solo Anthropic.
#
# Plan de rollout:
#   1. Mergear con `false` y telemetría 1 sprint para detectar skills que
#      rompen por falta de credencial cuando se flippea.
#   2. Flippear a `true` después de validar que ningún hook ni skill quedó
#      sin credencial necesaria (ver tests de #3085 + ejecución empírica de
#      builder/tester/delivery con scope `gradle-android`/`github`).
#
# Ver: docs/pipeline-multi-provider.md §5.2 (acoplamiento A16).
pipeline:
  env_isolation_enabled: false

  # (#3083 / CA-7 / SEC-6) Retención forense del audit trail (activity-log.jsonl).
  #
  # Define cuántos días de logs append-only conservamos antes de rotar /
  # depurar. Cualquier valor menor a 30 se eleva automáticamente al piso por
  # `lib/traceability.js` (clamp en código — NO se puede bajar desde config
  # por error humano o config maliciosa).
  #
  # Default: 90 días. Recomendado mínimo: 30 días (piso hardcoded).
  audit_retention_days: 90

# =============================================================================
# #4309 — Ejecución del fallback in-flight (revive #3578)
#
# Cuando un agente arranca su turno con Anthropic y Anthropic se cuelga DURANTE
# el stream (caída in-flight, no pre-spawn), los detectores shadow de #3577
# (first-byte / stream-gap / eof-premature / transient-5xx) emiten la señal de
# DECISIÓN (`inflight_signal_observed`). Lo que faltaba cablear era la
# EJECUCIÓN: tras decidir el secundario (openai-codex), spawnearlo y correr el
# turno con él reusando la maquinaria pre-spawn.
#
# Cuando `execution_enabled: true`, el pulpo, al disparar un detector in-flight:
#   1. mata el primario (taskkill /T confirma terminación),
#   2. decide el secundario vía `decideInflightFallback` (cap=1 + budget 90s),
#   3. lo spawnea con la MISMA ruta que el pre-spawn (buildChildEnv partial-
#      override → aislamiento de credenciales S-2 → runNonAnthropic),
#   4. emite `inflight_fallback_completed` (EJECUCIÓN ≠ señal de decisión).
#
# DEFAULT: ON. El ejecutor in-flight viene prendido — un fix no puede shippear
# apagado y degradar al comportamiento viejo (detecta pero no ejecuta). Este
# flag queda SOLO como kill-switch explícito: para volver al modo shadow-only
# (#3577, sin matar el primario ni spawnear el secundario) hay que setearlo
# explícitamente en `false`. Ausente/indefinido => ON.
#
# Aplica a CUALQUIER agente del pipeline (el ejecutor es skill-agnóstico), no
# solo al Telegram Commander. El cap=1 + budget acotan la amplificación de
# spawns ante una caída sostenida de Anthropic (modo de falla conocido).
inflight_fallback:
  execution_enabled: true

# =============================================================================
# #3343 — Sherlock verifier adversarial (split de #3331)
#
# Sherlock corre como capa interna del Commander de Telegram: antes de mandar
# cada respuesta, refuta el análisis con evidencia del estado actual del
# sistema. Usa la chain `telegram-sherlock` de `agent-models.json` con el orden
# de calidad aprobado (Anthropic Haiku 4.5 → Codex → Gemini → Cerebras →
# NVIDIA NIM). Si detecta inconsistencias, reelabora la respuesta (1 vez, cap
# hardcoded). Si timeout/error/sin-provider, agrega disclaimer F-6 y manda la
# original.
#
# Defensas (CA-SEC-1..9):
#   - sherlock_enabled solo se lee desde este archivo (CA-SEC-7 anti-toggle
#     remoto: cualquier intento de cambio via input del usuario emite
#     `sherlock_toggle_attempt_ignored` en el audit log y se ignora).
#   - sherlock_max_reelaboraciones es un CAP. El código aplica
#     `Math.min(valor, 1)` así que aunque alguien edite y ponga 99 acá,
#     el invariante hardcoded gana (CA-SEC-9). Mantener `1` documenta la
#     intención y evita confusión.
#
# Timeout (#3484, 2026-05-23):
#   El timeout local de Sherlock se ELIMINÓ — quedaba en 10s (default) con
#   clamp absoluto 30s, insuficiente para verificación adversarial real. Ahora
#   el presupuesto se delega al `lib/multi-provider/completion-client.js`:
#     - DEFAULT_TIMEOUT_MS  =  90 s   (per-request)
#     - ABSOLUTE_MAX_TIMEOUT_MS = 180 s (cap defensivo, no removible)
#   La defensa adicional vive en `pulpo.js` con un soft-timeout de 120s para
#   todo el turn handler — si Sherlock cuelga, libera el chat con mensaje
#   honesto al usuario (UX-2 / CA-UX-2).
#   `sherlock_timeout_ms` quedó como NO-OP: si está presente, se ignora con un
#   warning en el log. NO removerlo de configs viejas — el cargador es tolerante.
# =============================================================================
sherlock_enabled: true
# sherlock_timeout_ms: 10000      # DEPRECATED (#3484) — ahora delegado al cliente.
# Presupuesto por provider de la cascada Sherlock (#4104, revierte "timeout 0"
# del 2026-06-02 — ver #3925 / #3920). Default 40000, rango válido 30000–45000.
# Se propaga como timeoutMs a los spawn helpers; cuando un eslabón supera el
# presupuesto recibe SIGTERM y la cascada salta al siguiente provider sin abortar
# la verificación global. NO confundir con la deprecada sherlock_timeout_ms
# (NO-OP por CA-SEC-7). Input malformado cae al default 40000 (clamp fail-safe).
sherlock_provider_budget_ms: 40000
sherlock_max_reelaboraciones: 1
# #4139 — Flujo SÍNCRONO de Sherlock (reemplaza el modelo OPTIMISTA de #4105).
# Presupuesto MÁXIMO de espera del verdict antes de despachar: el Commander espera
# SIEMPRE el verdict y entrega un único mensaje final consolidado (texto + audio ya
# verificados). Si el presupuesto se agota sin verdict, DEGRADA a F-6 ("no pude
# verificar; te muestro la original") y despacha igual — nunca cuelga el chat.
# Clamp duro [10000ms, 90000ms]: fuera de rango cae al default 90000ms.
sherlock_wait_budget_ms: 90000

# =============================================================================
# Agrupamiento de bursts de notificaciones Telegram (#3668)
# =============================================================================
# El drainer `servicio-telegram.js` agrupa archivos en `servicios/telegram/
# pendiente/` por clave (`pid + meta.type + skill + issue`) dentro de una
# ventana temporal antes de enviar a Telegram. Si N>1 archivos coinciden, se
# emite UN mensaje consolidado enumerando provider+error_class de cada intento
# (CA-1..CA-5 / S-5).
#
# El cap hardcoded en `lib/telegram-burst-grouper.js` clampea el valor a
# [BURST_WINDOW_MIN_MS=10s, BURST_WINDOW_MAX_MS=300s] sin importar lo que diga
# este archivo (S-10 — defense in depth contra config inválida o malicia).
#
# Default 60_000ms (60s) — cubre cascadas Sherlock de ~7ms-200ms holgadamente
# y produce 1 mensaje cada 60s en el peor caso.
telegram_burst_window_ms: 60000

# =============================================================================
# Reintentos de salientes Telegram (#4082)
# =============================================================================
# Confirmación de entrega real: `svc-telegram` marca un saliente como `enviado`
# SOLO cuando el API de Telegram responde `ok:true` con `message_id`. Si la
# entrega falla, el dropfile se reintenta con BACKOFF (no reencolado inmediato):
# `handleSendFailure` estampa `_nextRetryAt` y el poll de selección saltea los
# dropfiles cuyo `_nextRetryAt` sea futuro.
#
# IMPORTANTE: NO confundir con `precheck.max_retries` ni con el `max_retries` de
# RED de una sola request del http-client. Estas claves gobiernan los reintentos
# de la COLA de salientes (entrega lógica, cross-poll).
#
# SEC-3 (anti retry-storm): el barredor one-shot de `fallido/` al boot estampa
# `_nextRetryAt` escalonado para no reencolar los fallidos de golpe (HTTP 429).
# SEC-4 (anti stale): `stale_ttl_ms` descarta salientes `-cmd.json` más viejos
# que el TTL en vez de reenviarlos fuera de contexto.
#
# Valores fuera de rango caen al default con warning — nunca rompen el servicio.
telegram_outbound:
  max_retries: 5            # Tope estricto de reintentos antes de fallido/ terminal
  backoff_base_ms: 5000     # Base del backoff exponencial: base * 2^(intento-1)
  backoff_max_ms: 300000    # Tope del backoff por intento (5 min)
  stale_ttl_ms: 86400000    # TTL de descarte de salientes viejos (24h) — SEC-4
  sweep_stagger_ms: 3000    # Escalonado entre fallidos reencolados por el barredor — SEC-3

# =============================================================================
# Notificación de entregables del pipeline (#3414)
# =============================================================================
# Cuando un skill notificable (guru, po, ux, planner) cierra una fase del
# pipeline `definicion` con `resultado: aprobado`, el pulpo encola un mensaje
# Telegram con preview del entregable + envelope canónico que `/rechazar`
# (#3415) puede parsear. Es human-in-the-loop OPCIONAL y NO bloqueante.
#
# Reglas de seguridad (lib/deliverable-notify.js):
#   - CA-SEC-1: validación de path del adjunto bajo `attachment_root`. Rechaza
#     `..`, null-bytes, absolutes fuera del root y symlinks que escapan.
#   - CA-SEC-2: envelope HTML comment con `skill`/`fase`/`pipeline` derivados
#     del nombre del archivo y directorio — NUNCA del YAML editable del agente.
#   - CA-SEC-3: audit log JSONL con content_hash + preview sanitizado (200
#     chars max, redact defense-in-depth) + ruta relativa.
#
# Lo que SÍ es configurable acá:
#   - enabled:               flag global. Default OFF (rollout gradual).
#   - kill_switch:           override de enabled (true → apagado total runtime).
#   - skills:                subset notificable. Cambios requieren OK humano.
#   - truncate_chars:        cap del preview de `notas:` en el mensaje.
#   - attachment_roots:      root allowlisteado por tipo de adjunto (ver abajo).
#                            (#3931 — el legacy `attachment_root` plano se eliminó;
#                            era redundante con `attachment_roots.image`.)
#   - dedup_window_hours:    ventana de dedup por content_hash.
#   - audit_file:            JSONL append-only. Path relativo al repo root.
#
# #3539 (CA-UX-9) — audio TTS automático junto con la notificación de texto.
#   - audio_enabled:         dispara TTS post-enqueue del texto (fire-and-forget).
#                            Default OFF (rollout gradual). Cuando esta en true,
#                            cada notificacion enviada genera 1-3 chunks .ogg
#                            con la voz del skill (Sócrates para guru, Meche para
#                            po, Lili para ux, Don Julio para planner).
#   - kill_switch_audio:     corta SOLO el audio sin afectar el texto/foto
#                            (independiente de kill_switch).
#   - audio_root:            root donde se persisten los .ogg generados
#                            (relativo al repo). Listado en .gitignore.
#   - max_tts_chunks:        cap de chunks por notificacion (CA-SEC-2 anti
#                            chunk-bombing). Default 3.
#   - tts_chunk_timeout_ms:  timeout por chunk TTS (CA-SEC-4). Default 30000.
#
# Rollout sugerido:
#   1. Mergear con `enabled: false`. Validar tests unitarios + smoke.
#   2. Activar con `enabled: true` y observar audit JSONL durante 1-2 días.
#   3. Si aparecen ruidos no esperados, `kill_switch: true` corta sin reiniciar.
#   4. Para audio: activar `audio_enabled: true` cuando el texto se valide en
#      caliente (rollout independiente).
deliverable_notifications:
  enabled: true
  kill_switch: false
  # EP3-H2 (#3928) — whitelist ampliada a 13 skills. Sincronizada con
  # `attachments_per_skill` (abajo) y `SKILL_SOURCES`
  # (.pipeline/lib/skill-deliverable-attachments.js). Los 3 cambios van juntos.
  # #4019 — `delivery` sumado para notificar el avance de ola al entregar/mergear
  # un issue (la sección de ola solo se calcula para skill=delivery, fase=entrega).
  skills: [guru, po, ux, planner, qa, tester, security, build, architect, backend-dev, android-dev, web-dev, pipeline-dev, delivery]
  truncate_chars: 1500
  dedup_window_hours: 24
  audit_file: ".pipeline/audit/deliverable-notifications.jsonl"
  # #3539 — audio TTS opcional. Default OFF (rollout gradual). Activar con OK
  # operativo y monitorear audit JSONL para records `kind:'audio'`.
  # EP3-H4 (#3930) paso 2: rollout reanudado — audio del entregable con Edge TTS
  # (stack gratuito EP-1). Corte en caliente sin reiniciar: kill_switch_audio: true.
  audio_enabled: true
  kill_switch_audio: false
  audio_root: ".pipeline/audio/notifications"
  max_tts_chunks: 3
  tts_chunk_timeout_ms: 30000

  # =========================================================================
  # #3540 — Adjuntos multimedia (V1: document, image, video, animation).
  # HTML diferido a V2 (requiere DOMPurify+jsdom, #3547 sin mergear).
  # =========================================================================
  # CA-FUNC-1: por skill, qué tipos de adjuntos esperar + qué extensiones.
  # Validación negativa: cualquier extensión fuera de `formats` se rechaza
  # (`format_not_allowed`) sin bloquear el resto.
  attachments_per_skill:
    guru:    { types: [document],                   formats: [.pdf, .md] }
    po:      { types: [document],                   formats: [.pdf, .md] }
    planner: { types: [document],                   formats: [.pdf, .md] }
    # #3931 — ux produce imágenes (PNG/JPG mockups) y videos (MP4/WEBM demos).
    # El type `animation` y el format `.gif` se quitaron: ningún productor de ux
    # los emite (los `.gif` se descubrían como `image`, no como `animation`).
    # El engine sigue soportando `animation` para futuros productores (#3540).
    ux:      { types: [image, video],               formats: [.png, .jpg, .jpeg, .mp4, .webm] }
    qa:      { types: [video, document],            formats: [.mp4, .webm, .pdf] }
    # EP3-H2 (#3928) — perfiles nuevos. SEC-1: `build` SOLO .md/.pdf curado, NO
    # .log crudo (filtra secretos). SEC-4: devs adjuntan resumen .md, no código.
    tester:    { types: [document],                 formats: [.pdf, .md] }
    security:  { types: [document],                 formats: [.pdf, .md] }
    build:     { types: [document],                 formats: [.pdf, .md] }
    architect: { types: [document],                 formats: [.pdf, .md] }
    backend-dev:  { types: [document],              formats: [.md, .pdf] }
    android-dev:  { types: [document],              formats: [.md, .pdf] }
    web-dev:      { types: [document],              formats: [.md, .pdf] }
    pipeline-dev: { types: [document],              formats: [.md, .pdf] }

  # CA-SEC-EXT-1: root allowlisteado por tipo. Cualquier path fuera del root
  # configurado se rechaza con `outside_root` SIN tocar disco.
  # #3931 (B9) — `video` repunta a `qa/evidence` (donde ux/qa realmente graban
  # los .mp4: `qa/evidence/<issue>/`). Antes apuntaba a `.pipeline/assets/videos`,
  # un dir inexistente sin productor → todo video real se rechazaba `outside_root`.
  # El root `animation` se eliminó (sin productor; el engine usa su default JS si
  # algún productor futuro emite type `animation`).
  attachment_roots:
    document:  ".pipeline/assets/docs"
    image:     ".pipeline/assets/mockups"
    video:     "qa/evidence"

  # CA-SEC-EXT-5: caps absolutos contra resource exhaustion.
  attachment_max_count: 5                     # >5 adjuntos por notificación → resto rechazado
  attachment_max_size_bytes: 52428800         # 50 MB cap local (más que los 20 MB Telegram)
  attachment_video_max_duration_s: 300        # 5 min máximo por video (ffprobe duration check)

# Issue #3541 — Entregables parciales del CUA (Comando de Usuario Asistido).
#
# Cuando el operador ejecuta un comando determinístico (ej. /cargar-ola, /wave
# promote, /listado), el commander emite stages intermedios (`init`,
# `validation`, `analysis`, `completion`) que se notifican a Telegram con
# texto + audio TTS + adjuntos opcionales. La pieza vive en
# `.pipeline/lib/deliverable-notify.js` (notifyCua) y se invoca desde
# `commander-deterministic.js` con CA-TEC-2 (filtrado en el caller).
#
# Flags:
#   - enabled:                kill principal. Default false → rollout gradual.
#                             Activar con OK operativo y revisar audit JSONL
#                             antes de subir el flag a true en main.
#   - kill_switch:            corta sin reiniciar el pulpo (CA-FUNC-5).
#   - notifiable_stages:      qué stages se notifican. Quitar entradas para
#                             rebajar verbosity. `init` y `completion` son los
#                             más útiles para baseline; `validation` y
#                             `analysis` para comandos complejos.
#   - allowed_commands:       whitelist sincronizada con SEC-3 del security
#                             agent. Doble check con regex `^[a-z][a-z0-9-]{0,40}$`.
#                             Comandos fuera de esta lista → audit
#                             `invalid_command` y NO notifican.
#   - query_only_commands:    (#4145) subconjunto de `allowed_commands` que son
#                             solo-consulta de estado. Saltean el auto-emit de
#                             notis `init`/`completion` (y su envelope
#                             `<!-- pipeline-meta -->`): la respuesta del handler
#                             ya es la entrega, las notis serían ruido en Telegram.
#                             NUNCA incluir comandos con efecto lateral (pausar,
#                             reanudar, restart, stop, limpiar, load-wave,
#                             allowlist, dashboard-up/down, ghostbusters, descanso):
#                             esos SÍ deben emitir trazabilidad. Un comando aquí
#                             que no esté en `allowed_commands` simplemente no
#                             tiene efecto (el gate exige ambas listas). El audit
#                             (`auditLog.record`) corre igual para todos.
#   - truncate_chars:         max chars del preview narrable. Excede →
#                             truncatePreserveLines + ' (continúa en el issue)'.
#                             Default 1500 (igual que pipeline issues).
#   - dedup_window_hours:     CA-UX-7 — ventana de dedup. Default 1h (NO 24h
#                             del patrón issues — el operador corre comandos
#                             repetidos varias veces el mismo día).
#   - max_attachment_bytes:   CA-SEC-2 — cap antes del upload (default 5 MB).
#                             Rechazo previo con audit `attachment_too_large`.
#   - attachment_subroot:     subdir bajo `.pipeline/cua-outputs/` (root
#                             hardcodeado, CA-SEC-5). Vacío = root directo.
#   - audit_file:             JSONL append-only — mismo archivo que
#                             deliverable_notifications, discriminado por
#                             skill:'cua' + command presente.
#   - audio_enabled:          CA-FUNC-3 — audio TTS opt-in (default OFF).
#                             Activar después del rollout texto-only.
#   - kill_switch_audio:      corta audio sin afectar texto.
#   - audio_root:             ruta de los .ogg generados (default compartido
#                             con notifications).
#
# Rollout sugerido (mismo patrón que #3414/#3539):
#   1. Mergear con `enabled: false`. Validar tests unitarios + smoke local.
#   2. Activar `enabled: true` + `audio_enabled: false`. Observar audit JSONL
#      por 1-2 días para detectar ruido.
#   3. Una vez estable, `audio_enabled: true` para activar TTS.
#   4. Si aparece ruido inesperado, `kill_switch: true` corta sin reiniciar.
cua:
  # EP3-H4 (#3930) — rollout reanudado (paso 1: CUA texto-only). El operador
  # autorizado a /rechazar se resuelve desde credentials.json (env), ver
  # operator_chat_ids más abajo. Corte en caliente: kill_switch: true.
  enabled: true
  kill_switch: false
  notifiable_stages: [init, validation, analysis, completion]
  # Sincronizado con security SEC-3. AGREGAR comandos nuevos solo después de
  # decidir su nombre canónico (debe matchear regex `^[a-z][a-z0-9-]{0,40}$`).
  allowed_commands:
    - load-wave
    - wave
    - validate-issue
    - generate-report
    - listado
    - status
    - snapshot
    - allowlist
    - tail
    - dashboard-up
    - dashboard-down
    - screenshot
    - procesos
    - salud
    - descanso
    - quota
    - actividad
    - ghostbusters
    - pausar
    - reanudar
    - costos
    - limpiar
    - restart
    - bloqueados
    - stop
  # Comandos solo-consulta: saltean el auto-emit de notis init/completion
  # (#4145). La respuesta del handler ya es la entrega; las notis serían ruido.
  # NO incluir comandos con efecto lateral (ver doc del bloque arriba).
  query_only_commands:
    - wave
    - status
    - listado
    - snapshot
    - salud
    - quota
    - actividad
    - costos
    - bloqueados
  truncate_chars: 1500
  dedup_window_hours: 1
  max_attachment_bytes: 5242880  # 5 MB (CA-SEC-2)
  attachment_subroot: ""           # default: directo bajo .pipeline/cua-outputs/
  audit_file: ".pipeline/audit/deliverable-notifications.jsonl"
  # Issue #3541 — CA-SEC-6: chat_ids autorizados a `/rechazar` CUA.
  #
  # EP3-H4 (#3930): el chat_id del operador NO se hardcodea acá — este es un
  # archivo público del repo y la convención mantiene los chat_ids en
  # credentials.json (mismo criterio que el bot_token/chat_id y el handler
  # #3384). El wiring `resolveCuaOperatorChatIds` (pulpo.js) resuelve el
  # operador por precedencia:
  #   1. esta lista (allowlist explícita, para operadores extra no sensibles)
  #   2. TELEGRAM_LEO_OPERATOR_CHAT_ID (credential dedicada del operador)
  #   3. fallback al chat principal autorizado (getTelegramChatId) — el único
  #      que pasa el filtro expectedChatId del dispatcher.
  # Por eso esta lista queda vacía: el operador (Leo) ya viene del chat
  # principal de credentials.json. NO es fail-closed pese al `[]`.
  operator_chat_ids: []
  # Audio TTS opt-in (CA-FUNC-3, CA-UX-3). Default OFF — el rollout texto se
  # estabiliza antes.
  audio_enabled: false
  kill_switch_audio: false
  audio_root: ".pipeline/audio/notifications"
  max_tts_chunks: 3
  tts_chunk_timeout_ms: 30000

# =============================================================================
# #3613 — Bootstrap del skill `architect` (paraguas #3559, spike #3507)
# =============================================================================
# El skill `architect` corre en dos fases:
#   1. `definicion/criterios` — produce la receta técnica ("Detalles Técnicos")
#      antes de que el issue se promueva a `Ready`. Debe esperar (espera
#      blanda, docs/pipeline/architect-role.md §2) hasta que al menos uno
#      entre PO o UX deje un comment en `criterios`. El polling NO se
#      ejecuta como instrucción del prompt LLM (caro y propenso a errores);
#      vive en banda como wiring determinístico del agent-launcher que
#      dispara al architect cuando hay primer comment PO/UX en `criterios`
#      o cuando expira el cap.
#   2. `desarrollo/aprobacion` — verifica adherencia diff vs receta firmada
#      (architect-role.md §9). En esta fase NO hay espera blanda.
#
# Lo configurable acá:
#   - poll_cap_min: tope superior (en minutos) de la espera blanda en
#                   `criterios`. Default 30 min. Si tras este cap no
#                   aparecen comments PO/UX, el architect arranca igual
#                   con lo que tenga (body refinado + análisis previos).
#   - poll_interval_seconds: cadencia del polling en banda. Default 30s.
#                            Mantener corto para no introducir latencia
#                            visible al pipeline.
#
# CAPs hardcoded (NO configurables desde acá por defensa anti-config-malicioso,
# patrón cost_anomaly_alert.max_snooze_hours):
#   - El polling efectivo se clamp a [1, 120] minutos en lib/agent-launcher.
#     Aunque alguien edite y ponga `poll_cap_min: 9999`, el cap absoluto gana.
architect:
  poll_cap_min: 30
  poll_interval_seconds: 30

  # ===========================================================================
  # #3614 — Gate de promoción criterios → Ready (B3 del paraguas #3559)
  # ===========================================================================
  # El gate verifica 3 condiciones antes de aprobar la promoción de un issue
  # del pipeline `definicion` al label `Ready`:
  #   1. Sección `## Detalles Técnicos` ≥200 chars en el body.
  #   2. Comment con marker `<!-- architect-signoff issue=NNNN -->` del bot.
  #   3. Entrada signoff con marker_hash matching en architect-tokens.jsonl.
  #
  # Defaults fail-safe (rollout sin sorpresas):
  #   - `enabled: false` → gate ni se invoca (cortocircuito, kill switch R6).
  #   - `gate_mode: dry-run` → cuando se active, evalúa pero NO bloquea.
  #
  # Para activar el piloto:
  #   1. `enabled: true` con `gate_mode: dry-run` (semanas 1-2 del rollout).
  #   2. Una vez validado el go/no-go (<5% falsos positivos), cambiar a
  #      `gate_mode: enforce`.
  #
  # `go_live_date`: ISO8601. Issues con `createdAt` anterior a esta fecha
  # se grandfatherean automáticamente (CA-4), sin evaluar las 3 condiciones.
  # Permite rollout sin paralizar issues legacy.
  #
  # `bot_login`: cuenta GitHub autorizada a emitir el marker comment. Default
  # `architect-bot` (Opción A, cuenta dedicada — ver architect-rollout-plan.md
  # §4). Si se opta por Opción B (github-actions), cambiar a
  # `github-actions[bot]`.
  #
  # Ver: docs/pipeline/architect-rollout-plan.md, .pipeline/lib/architect-signoff-gate.js
  enabled: false
  gate_mode: dry-run
  go_live_date: '2026-05-29T00:00:00Z'
  bot_login: architect-bot

# #3488 (Spike #3378 H2) — Planificación multi-ola del skill /planner.
#
# Capacidad por ola: cuántos issues máximos entran cuando el operador ejecuta
# `/planner componer-ola <N>` o `/planner horizonte N`. La composición respeta
# este cap como hard limit; los issues que no entran quedan en el backlog
# remanente y se reportan al operador.
#
# Horizonte máximo: cuántas olas adelante puede planificar `/planner horizonte`.
# Limitar evita que un descuido (ej. `horizonte 1000`) bloquee la terminal
# imprimiendo miles de issues. SEC-1 del análisis de seguridad de #3488.
#
# Estos valores son leídos por `.pipeline/scripts/planner-waves-cli.js` con
# defaults seguros si la sección no existe.
waves:
  capacity: 9
  max_horizon: 12

# =============================================================================
# Transición automática de ola (#4368, Ola 8.3)
# =============================================================================
# El brazo `brazoTransicionOla` (pulpo.js) detecta si TODOS los issues de la ola
# activa están cerrados en GitHub y, según `mode`:
#   - notify (DEFAULT): NO promueve; avisa al operador ("/wave ready-to-close N")
#     y deja evidencia en logs/waves.jsonl. Respeta el diseño aprobado
#     `docs/pipeline/modelo-planificacion-multi-ola.md` §3 ("nunca se abre una ola
#     por automatismo") y la regla "preferir bloqueado-humano a rebote automático".
#   - auto: promueve la siguiente ola planificada vía promoteWaveAtomic
#     (transacción atómica + backup a archived/ + rollback). Opt-in EXPLÍCITO de
#     Leo; habilitar sólo tras validar `mode: notify` en producción y con #4350
#     (sync allowlist↔waves) sólido.
#
# Kill-switch (CA-6): `enabled: false` o `kill_switch: true` ⇒ el brazo no hace
# NADA (ni notify ni auto). Default conservador. Todo fail-closed: ante cualquier
# ambigüedad de `gh` (exit≠0, timeout, issue ausente) NO promueve.
#
# Corte en caliente: `kill_switch: true` desactiva sin reiniciar el pulpo.
wave_auto_transition:
  enabled: false        # kill switch maestro: false ⇒ el brazo no hace nada
  kill_switch: false    # override de emergencia adicional
  mode: notify          # "notify" (default) | "auto" (opt-in explícito de Leo)
  gh_timeout_ms: 30000  # timeout por consulta `gh issue view`

# =============================================================================
# Telegram — config PÚBLICA del bot (#3957, EP8-H4 / CA-3)
# =============================================================================
# bot_username es el handle público del bot (sin @). Se usa para construir el
# deep-link `https://t.me/<username>?start=<payload>` de la ventana Bloqueados.
# Validado contra `^[A-Za-z0-9_]{5,32}$` antes de exponerse al dashboard.
#
# SEGURIDAD: acá SÓLO va información pública. El `bot_token` y el `chat_id`
# (secretos) viven en `~/.claude/secrets/credentials.json`, NUNCA en este
# archivo ni en el HTML renderizado. Si bot_username falta o es inválido, el
# dashboard simplemente no renderiza el deep-link de Telegram (degradación
# limpia: queda el deep-link a GitHub).
telegram:
  bot_username: "intrale_bot"

