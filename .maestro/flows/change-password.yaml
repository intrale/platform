appId: com.intrale.app.client
---
# Flujo: Cambio de contraseña — login + navegar a cambio de password
- launchApp
- waitForAnimationToEnd

# Saltar onboarding (aparece en primer uso)
- tapOn:
    text: "Saltar"
    optional: true

- waitForAnimationToEnd

# Navegar al login desde home
- tapOn:
    text: "Ya tengo cuenta"
    optional: true

- waitForAnimationToEnd

# Login con credenciales válidas
- tapOn:
    id: "field_Usuario"
- inputText: "admin@intrale.com"

- tapOn:
    id: "field_Contrase.*"
- inputText: "Admin1234!"

- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Esperar a que cargue la pantalla principal
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 15000

# Navegar al menú/perfil para encontrar cambio de contraseña
# Buscar opción de menú o perfil
- tapOn:
    text: "Cambiar contrase.*"
    optional: true

# Si no encontramos directamente, buscar en navegación
- tapOn:
    text: "Perfil"
    optional: true

- waitForAnimationToEnd

- tapOn:
    text: "Cambiar contrase.*"
    optional: true

- waitForAnimationToEnd

# Tomar screenshot de la pantalla (puede ser home o change password)
- takeScreenshot: change-password-screen
