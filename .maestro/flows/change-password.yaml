appId: com.intrale.app.client
---
# Flujo: Cambio de contrasena — login + navegar a cambio de password
- launchApp
- extendedWaitUntil:
    visible:
      text: "Ya tengo cuenta"
    timeout: 15000

# Navegar al login desde la pantalla de bienvenida
- tapOn:
    text: "Ya tengo cuenta"

- extendedWaitUntil:
    visible:
      id: "login_screen"
    timeout: 10000

# Login con credenciales validas
- tapOn:
    id: "field_Usuario"
- inputText: "admin@intrale.com"

- tapOn:
    id: "field_Contraseña"
- inputText: "Admin1234!"

- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Esperar a que cargue la pantalla principal
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 15000

# Tomar screenshot de la pantalla post-login
- takeScreenshot: change-password-post-login

# Navegar al perfil para encontrar cambio de contrasena
- tapOn:
    text: "Perfil"
    optional: true

- waitForAnimationToEnd

- tapOn:
    text: "Cambiar contraseña"
    optional: true

- waitForAnimationToEnd

# Tomar screenshot de la pantalla (puede ser home o change password)
- takeScreenshot: change-password-screen
