appId: com.intrale.app.client
---
# Flujo E2E: Validacion #1931 - Detalle de pedido con DeliveryEstimationCard
# Prerrequisito: Cliente logueado (usar validate-1931-login-cliente.yaml antes)
# Prerrequisito de DATOS: la cuenta qa-cliente@intrale.com.ar debe tener al menos
#   un pedido activo (estado distinto de DELIVERED/CANCELLED) en el negocio "intrale".
#   Si no hay datos, este flujo se queda en "Mis pedidos" mostrando "no hay pedidos"
#   o cae al filtro vacio (esto se documenta como evidencia honesta).
#   Para seedear datos previo a la corrida ver: qa/scripts/seed-1931-order.sh
#
# Verifica los criterios visuales del issue #1931:
# - Criterio 1: tarjeta "Tiempo estimado de entrega" con minutos destacados (~XX min)
# - Criterio 2: factor "X pedidos activos en cola" en la fila de factores
# - Criterio 3: factor "Distancia: Y km" en la fila de factores
# - Criterio 5: barra de progreso visual segun estado del pedido
# - Criterio 7: aviso de demora cuando isDelayed=true (depende del backend)

- launchApp:
    clearState: false

- waitForAnimationToEnd

# Esperar el home del cliente y navegar a "Mis pedidos" desde la bottom bar
- extendedWaitUntil:
    visible:
      text: "Mis pedidos"
    timeout: 15000

- takeScreenshot: 1931-detalle-01-home

- tapOn:
    text: "Mis pedidos"

- waitForAnimationToEnd

# Esperar el listado de pedidos. El titulo de pantalla tambien es "Mis pedidos".
- extendedWaitUntil:
    visible:
      text: "Mis pedidos"
    timeout: 10000

- takeScreenshot: 1931-detalle-02-listado

# Filtrar por "Pendiente" para asegurar que vemos un pedido activo si existe.
# Si no hay pedidos en ese estado, intentar "Confirmado", "Preparando", "Listo"
# o "En camino" (todos son estados activos).
- tapOn:
    text: "Pendiente"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Confirmado"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Preparando"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Listo"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "En camino"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: 1931-detalle-03-filtro-activo

# Resetear filtro a "Todos" antes de hacer tap en un pedido. Asi maximizamos las
# chances de encontrar al menos uno visible si existe en la cuenta QA.
- tapOn:
    text: "Todos"
    optional: true
- waitForAnimationToEnd

# Tap sobre la primera card de pedido visible. Las cards arrancan con "#" + shortCode
# y tienen el nombre del negocio. Para no acoplarnos a un shortCode, intentamos por
# el chip de estado (cualquier estado activo).
- runFlow:
    when:
      visible:
        text: "Pendiente"
    commands:
      - tapOn:
          text: "Pendiente"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Preparando"
    commands:
      - tapOn:
          text: "Preparando"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "En camino"
    commands:
      - tapOn:
          text: "En camino"
      - waitForAnimationToEnd

- takeScreenshot: 1931-detalle-04-navegando

# Verificar que estamos en el detalle del pedido
- extendedWaitUntil:
    visible:
      text: "Detalle del pedido"
    timeout: 10000

- takeScreenshot: 1931-detalle-05-detalle-loaded

# Criterio 1 + 2 + 3: Tarjeta de estimacion inteligente.
# El componente DeliveryEstimationCard solo se renderiza si el pedido esta
# activo y la API /delivery/time-estimation respondio OK.
- assertVisible:
    text: "Tiempo estimado de entrega"
- takeScreenshot: 1931-detalle-06-estimacion-card

# Scroll hacia abajo para ver factores contextuales y barra de progreso si
# quedaran fuera del viewport en pantallas chicas.
- scrollUntilVisible:
    element:
      text: "pedidos activos en cola"
    direction: DOWN
    timeout: 5000

- takeScreenshot: 1931-detalle-07-factor-active-orders

- scrollUntilVisible:
    element:
      text: "Distancia:"
    direction: DOWN
    timeout: 5000

- takeScreenshot: 1931-detalle-08-factor-distancia

# Criterio 5: barra de progreso. La etiqueta debajo es uno de:
#   "Preparando tu pedido", "En camino" o "Entregado". Buscamos cualquiera.
- runFlow:
    when:
      visible:
        text: "Preparando tu pedido"
    commands:
      - takeScreenshot: 1931-detalle-09-progress-preparando

- runFlow:
    when:
      visible:
        text: "En camino"
    commands:
      - takeScreenshot: 1931-detalle-09-progress-encamino

- runFlow:
    when:
      visible:
        text: "Entregado"
    commands:
      - takeScreenshot: 1931-detalle-09-progress-entregado

# Criterio 7: aviso de demora. Si el backend determino isDelayed=true, se ve un
# texto en color error. Lo capturamos optional para no romper si no aplica.
- runFlow:
    when:
      visible:
        text: "demor"
    commands:
      - takeScreenshot: 1931-detalle-10-aviso-demora

- takeScreenshot: 1931-detalle-11-complete
