appId: com.intrale.app.client
---
# Flujo: ClientProductDetail — Detalle de producto y stepper
# Issue #1120 — QA Compliance Catálogo de Producto

- launchApp:
    clearState: true

# Saltar onboarding si aparece
- extendedWaitUntil:
    visible:
      text: "Saltar"
    timeout: 10000
- tapOn:
    text: "Saltar"
    optional: true

# Login
- extendedWaitUntil:
    visible:
      text: "Ya tengo cuenta"
    timeout: 15000
- tapOn:
    text: "Ya tengo cuenta"

- extendedWaitUntil:
    visible:
      id: "login_screen"
    timeout: 10000

- tapOn:
    id: "field_Usuario"
- inputText: "admin@intrale.com"
- tapOn:
    id: "field_Contraseña"
- inputText: "Admin1234!"
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Esperar Home del cliente cargado
- extendedWaitUntil:
    visible:
      text: "Ver catálogo"
    timeout: 20000

# Ir al catálogo para seleccionar un producto
- tapOn:
    text: "Ver catálogo"

- waitForAnimationToEnd
- takeScreenshot: product-detail-catalog-open

# Agregar un producto al carrito desde el catálogo
- tapOn:
    text: "Agregar"
    index: 0
    optional: true
- waitForAnimationToEnd
- takeScreenshot: product-detail-added-from-catalog

# Screenshot del catálogo con estado actualizado
- takeScreenshot: product-detail-catalog-after-add

# Volver al home y ver icono carrito con contador
- pressKey: back
- waitForAnimationToEnd
- takeScreenshot: product-detail-home-cart-counter
