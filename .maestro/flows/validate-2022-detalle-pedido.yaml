appId: com.intrale.app.delivery
---
# Flujo E2E: Validación #2022 — Criterio 2: Ver detalle del pedido
# Prerrequisito: Usuario delivery logueado con pedidos asignados
# Verifica: productos, dirección, cliente, método de pago

- launchApp:
    clearState: false

- waitForAnimationToEnd

# Esperar home
- extendedWaitUntil:
    visible:
      text: "Pedidos activos"
    timeout: 15000

- takeScreenshot: 2022-detalle-01-home

# Tap en el primer pedido visible (card)
- tapOn:
    text: "Pendiente"
    optional: true
- waitForAnimationToEnd

# Si no hay "Pendiente", intentar con "En progreso" o "En camino"
- tapOn:
    text: "En progreso"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "En camino"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: 2022-detalle-02-navigating

# Verificar que estamos en la pantalla de detalle
- extendedWaitUntil:
    visible:
      text: "Pedido"
    timeout: 10000

- takeScreenshot: 2022-detalle-03-detail

# Verificar secciones del detalle
- assertVisible:
    text: "Pedido"

# Scroll down para ver más info
- scrollUntilVisible:
    element:
      text: "Productos"
    direction: DOWN
    timeout: 5000

- takeScreenshot: 2022-detalle-04-productos

# Scroll para ver dirección
- scrollUntilVisible:
    element:
      text: "Dirección"
    direction: DOWN
    timeout: 5000

- takeScreenshot: 2022-detalle-05-direccion

# Scroll para ver cliente
- scrollUntilVisible:
    element:
      text: "Cliente"
    direction: DOWN
    timeout: 5000

- takeScreenshot: 2022-detalle-06-cliente

- takeScreenshot: 2022-detalle-07-complete
