appId: com.intrale.app.client
---
# Flujo: Confirmar recuperación de contraseña — navegar y probar validaciones
- launchApp
- waitForAnimationToEnd

# Saltar onboarding (aparece en primer uso)
- tapOn:
    text: "Saltar"
    optional: true

- waitForAnimationToEnd

# Navegar al login desde home
- tapOn:
    text: "Ya tengo cuenta"
    optional: true

- waitForAnimationToEnd

# Tocar enlace "Ya tengo un código de recuperación"
- scrollUntilVisible:
    element:
      text: "Ya tengo un c.*digo.*"
    direction: DOWN
- tapOn:
    text: "Ya tengo un c.*digo.*"

- waitForAnimationToEnd

# Verificar que estamos en la pantalla de confirmación
- assertVisible:
    id: "confirm_password_recovery_screen"

# Tomar screenshot de la pantalla vacía
- takeScreenshot: confirm-recovery-empty

# Llenar formulario con datos de prueba
- tapOn:
    id: "field_Correo electr.*"
- inputText: "test@intrale.com"

- tapOn:
    id: "field_C.*digo"
- inputText: "123456"

- tapOn:
    id: "field_Contrase.*"
    index: 0
- inputText: "NewPass123!"

# Scroll para ver campo de confirmar contraseña
- scrollUntilVisible:
    element:
      id: "field_Confirmar contrase.*"
    direction: DOWN

- tapOn:
    id: "field_Confirmar contrase.*"
- inputText: "DifferentPass!"

# Tomar screenshot con passwords que no coinciden
- takeScreenshot: confirm-recovery-mismatch

# Intentar enviar con passwords diferentes (validación)
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del error de validación
- takeScreenshot: confirm-recovery-validation-error

# Corregir el campo de confirmación
- tapOn:
    id: "field_Confirmar contrase.*"
- eraseText: 14
- inputText: "NewPass123!"

# Tomar screenshot con formulario correcto
- takeScreenshot: confirm-recovery-filled

# Enviar formulario
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del resultado
- takeScreenshot: confirm-recovery-submitted
