appId: com.intrale.app.client
---
# Flujo: Confirmar recuperacion de contrasena — navegar y probar validaciones
- launchApp
- extendedWaitUntil:
    visible:
      text: "Ya tengo cuenta"
    timeout: 15000

# Navegar al login desde la pantalla de bienvenida
- tapOn:
    text: "Ya tengo cuenta"

- extendedWaitUntil:
    visible:
      id: "login_screen"
    timeout: 10000

# Tocar enlace "Ya tengo un codigo de recuperacion"
- scrollUntilVisible:
    element:
      text: "Ya tengo un código de recuperación"
    direction: DOWN
- tapOn:
    text: "Ya tengo un código de recuperación"

- extendedWaitUntil:
    visible:
      id: "confirm_password_recovery_screen"
    timeout: 10000

# Verificar que estamos en la pantalla de confirmacion
- assertVisible:
    id: "confirm_password_recovery_screen"

# Tomar screenshot de la pantalla vacia
- takeScreenshot: confirm-recovery-empty

# Llenar formulario con datos de prueba
- tapOn:
    id: "field_Correo electrónico"
- inputText: "test@intrale.com"

- tapOn:
    id: "field_Código"
- inputText: "123456"

- tapOn:
    id: "field_Contraseña"
    index: 0
- inputText: "NewPass123!"

# Scroll para ver campo de confirmar contrasena
- scrollUntilVisible:
    element:
      id: "field_Confirmar contrasena"
    direction: DOWN

- tapOn:
    id: "field_Confirmar contrasena"
- inputText: "DifferentPass!"

# Tomar screenshot con passwords que no coinciden
- takeScreenshot: confirm-recovery-mismatch

# Intentar enviar con passwords diferentes (validacion)
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del error de validacion
- takeScreenshot: confirm-recovery-validation-error

# Corregir el campo de confirmacion
- tapOn:
    id: "field_Confirmar contrasena"
- eraseText: 14
- inputText: "NewPass123!"

# Tomar screenshot con formulario correcto
- takeScreenshot: confirm-recovery-filled

# Enviar formulario
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del resultado
- takeScreenshot: confirm-recovery-submitted
