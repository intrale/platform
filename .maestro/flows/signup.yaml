appId: com.intrale.app.client
---
# Flujo: Signup basico
- launchApp
- extendedWaitUntil:
    visible:
      text: "Registrarme"
    timeout: 15000

# Navegar a registro desde la pantalla de bienvenida
- tapOn:
    text: "Registrarme"

- extendedWaitUntil:
    visible:
      id: "signup_screen"
    timeout: 10000

# Tomar screenshot de la pantalla de signup
- takeScreenshot: signup-empty

# Ingresar email de prueba
- tapOn:
    id: "field_Correo electrónico"
- inputText: "qa-maestro-test@intrale.com"

# Tomar screenshot con email ingresado
- takeScreenshot: signup-filled
