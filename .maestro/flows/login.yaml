appId: com.intrale.app.client
---
# Flujo: Login con credenciales
- launchApp

- assertVisible:
    id: "login_screen"
    label: "Pantalla de login visible"

- assertVisible:
    id: "field_Username"
    label: "Campo de usuario visible"

- tapOn:
    id: "field_Username"
- inputText: "admin@intrale.com"

- assertVisible:
    id: "field_Password"
    label: "Campo de password visible"

- tapOn:
    id: "field_Password"
- inputText: "Admin1234!"

- assertVisible:
    id: "btn_primary"
    label: "Boton de login visible"

- tapOn:
    id: "btn_primary"
