appId: com.intrale.app.client
---
# Flujo: Login con credenciales
- launchApp
- extendedWaitUntil:
    visible:
      text: "Ya tengo cuenta"
    timeout: 15000

# Navegar al login desde la pantalla de bienvenida
- tapOn:
    text: "Ya tengo cuenta"

- extendedWaitUntil:
    visible:
      id: "login_screen"
    timeout: 10000

# Tomar screenshot de la pantalla de login vacia
- takeScreenshot: login-empty

# Ingresar credenciales
- tapOn:
    id: "field_Usuario"
- inputText: "admin@intrale.com"

- tapOn:
    id: "field_Contraseña"
- inputText: "Admin1234!"

# Tomar screenshot con campos llenos
- takeScreenshot: login-filled

# Enviar formulario
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del resultado (home o error segun backend)
- takeScreenshot: login-submitted
