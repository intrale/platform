appId: com.intrale.app.client
---
# Flujo: Recuperación de contraseña — navegar desde login e ingresar email
- launchApp
- waitForAnimationToEnd

# Saltar onboarding (aparece en primer uso)
- tapOn:
    text: "Saltar"
    optional: true

- waitForAnimationToEnd

# Navegar al login desde home
- tapOn:
    text: "Ya tengo cuenta"
    optional: true

- waitForAnimationToEnd

# Tocar enlace "Recuperar contraseña"
- scrollUntilVisible:
    element:
      text: "Recuperar contrase.*"
    direction: DOWN
- tapOn:
    text: "Recuperar contrase.*"

- waitForAnimationToEnd

# Verificar que estamos en la pantalla de recuperación
- assertVisible:
    id: "password_recovery_screen"

# Tomar screenshot de la pantalla vacía
- takeScreenshot: password-recovery-empty

# Ingresar email de prueba
- tapOn:
    id: "field_Correo electr.*"
- inputText: "test@intrale.com"

# Tomar screenshot con email ingresado
- takeScreenshot: password-recovery-filled

# Tocar botón de enviar código
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del resultado (puede ser error o éxito según backend)
- takeScreenshot: password-recovery-submitted
