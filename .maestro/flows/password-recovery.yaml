appId: com.intrale.app.client
---
# Flujo: Recuperacion de contrasena — navegar desde login e ingresar email
- launchApp
- extendedWaitUntil:
    visible:
      text: "Ya tengo cuenta"
    timeout: 15000

# Navegar al login desde la pantalla de bienvenida
- tapOn:
    text: "Ya tengo cuenta"

- extendedWaitUntil:
    visible:
      id: "login_screen"
    timeout: 10000

# Tocar enlace "Recuperar contrasena"
- scrollUntilVisible:
    element:
      text: "Recuperar contraseña"
    direction: DOWN
- tapOn:
    text: "Recuperar contraseña"

- extendedWaitUntil:
    visible:
      id: "password_recovery_screen"
    timeout: 10000

# Verificar que estamos en la pantalla de recuperacion
- assertVisible:
    id: "password_recovery_screen"

# Tomar screenshot de la pantalla vacia
- takeScreenshot: password-recovery-empty

# Ingresar email de prueba
- tapOn:
    id: "field_Correo electrónico"
- inputText: "test@intrale.com"

# Tomar screenshot con email ingresado
- takeScreenshot: password-recovery-filled

# Tocar boton de enviar codigo
- tapOn:
    id: "btn_primary"

- waitForAnimationToEnd

# Tomar screenshot del resultado (puede ser error o exito segun backend)
- takeScreenshot: password-recovery-submitted
